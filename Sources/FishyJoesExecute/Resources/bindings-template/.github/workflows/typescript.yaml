---
name: TypeScript

"on":
  workflow_dispatch:
  push:
    branches: [main]
  label:
    types: [created]
  pull_request:
  release:
    types: [published]

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  NODE_VERSION: "16.x"
  SWIFT_WASM_VERSION: "5.6.0-RELEASE"

jobs:
  build-test-pack-ts-mac:
    name: "mac: Build and test typescript bindings"
    runs-on: macOS-12
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup Node
        uses: actions/setup-node@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@cricut'

      - name: Build library
        shell: zsh {0}
        run: |
          set -euxo pipefail

          # Hack. Xcode 13.3 hangs on a gui prompt while resolving
          sudo xcode-select -s /Applications/Xcode_13.2.1.app
          swift package resolve
          sudo xcode-select -s /Applications/Xcode_13.3.1.app

          swift run -- fishy-joes --nodejs --fat generate build

      - name: Test from node
        shell: zsh {0}
        run: |
          set -euxo pipefail

          swift run -- fishy-joes --nodejs --fat test

      - name: Pack
        shell: zsh {0}
        run: |
          set -euo pipefail

          VERSION=${GITHUB_REF#refs/*/}
          if [[ ! $VERSION =~ [0-9]+\.[0-9]+\.[0-9]+ ]]; then
              VERSION="0.0.1"
          fi
          swift run -- fishy-joes --nodejs --fat --version $VERSION pack

      - name: Upload NPM Artifact
        uses: actions/upload-artifact@v2
        with:
          name: npm_mac_packages
          path: cricut-*.tgz

  build-test-pack-ts-linux:
    name: "linux: Build and test typescript bindings"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup Node
        uses: actions/setup-node@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@cricut'

      - name: Configure build environment
        run: |
          set -euxo pipefail

          sudo apt-get install zsh

          curl -Lo swift-wasm.tgz "https://github.com/swiftwasm/swift/releases/download/swift-wasm-$SWIFT_WASM_VERSION/swift-wasm-$SWIFT_WASM_VERSION-ubuntu20.04_x86_64.tar.gz"
          sudo mkdir -p /Library/Developer/Toolchains/swift-wasm-$SWIFT_WASM_VERSION.xctoolchain
          sudo tar -xf swift-wasm.tgz -C /Library/Developer/Toolchains/swift-wasm-$SWIFT_WASM_VERSION.xctoolchain --strip-components 1

      - name: Build library
        shell: zsh {0}
        run: |
          set -euxo pipefail

          swift run -- fishy-joes --nodejs --wasm build

      - name: Test from node
        shell: zsh {0}
        run: |
          set -euxo pipefail

          swift run -- fishy-joes --nodejs --wasm test

      - name: Pack
        shell: zsh {0}
        run: |
          set -euo pipefail

          VERSION=${GITHUB_REF#refs/*/}
          if [[ ! $VERSION =~ [0-9]+\.[0-9]+\.[0-9]+ ]]; then
              VERSION="0.0.1"
          fi
          swift run -- fishy-joes --nodejs --wasm --version $VERSION pack

      - name: Upload NPM Artifact
        uses: actions/upload-artifact@v2
        with:
          name: npm_linux_packages
          path: cricut-*.tgz

  npm-publish:
    name: Publish NPM packages
    runs-on: ubuntu-latest
    needs:
      - build-test-pack-ts-linux
      - build-test-pack-ts-mac
    if: success() && github.event_name == 'release'
    steps:
      - name: Setup Node
        uses: actions/setup-node@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@cricut'

      - name: Retrieve NPM Package Artifact
        uses: actions/download-artifact@v2

      - name: Install zsh
        run: |
          set -euxo pipefail
          sudo apt-get install zsh

      - name: Publish NPM Package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: zsh {0}
        run: |
          set -euo pipefail

          for directory in npm_mac_packages npm_linux_packages; do
            (
              cd $directory
              for package in *.tgz; do
                npm publish $package
              done
            )
          done
