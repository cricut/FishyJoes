---
name: "Dart"

"on":
  workflow_dispatch:
  push:
    branches: [main]
  label:
    types: [created]
  pull_request:
  release:
    types: [published]

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build-test-dart-mac:
    name: "mac: Build and test dart bindings"
    runs-on: macOS-12
    env:
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - uses: dart-lang/setup-dart@v1

      - name: Build library
        shell: zsh {0}
        run: |
          set -euxo pipefail

          swift run -- fishy-joes --dart --fat generate build

      - name: Test library from dart
        shell: zsh {0}
        run: |
          set -euxo pipefail

          (cd dart; dart run fishyjoes_dart:setup)
          swift run -- fishy-joes --dart --fat test

      - name: Upload artifacts
        uses: actions/upload-artifact@v2
        with:
          name: mac_generated
          path: dart/native

  build-test-dart-linux:
    name: "linux: Build and test dart bindings"
    runs-on: ubuntu-latest
    container:
      image: swift
    env:
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - uses: dart-lang/setup-dart@v1

      - name: Configure build environment
        run: |
          set -eux
          apt-get -y update
          apt-get -y install zsh patchelf curl

      - name: Build library
        shell: zsh {0}
        run: |
          set -euxo pipefail
          swift run -- fishy-joes --dart build

      - name: Patch libs to use relative paths to swift stdlib
        shell: zsh {0}
        run: |
          cd dart/native/linux

          SWIFT_RUN_PATH='/usr/lib/swift/linux:./:$ORIGIN'
          for LIB in lib*.so*; do
            patchelf --set-rpath $SWIFT_RUN_PATH $LIB
          done

      - name: Test library from dart
        shell: zsh {0}
        run: |
          set -euxo pipefail
          (cd dart; dart run fishyjoes_dart:setup)
          swift run -- fishy-joes --dart test

      - name: Upload library
        uses: actions/upload-artifact@v2
        with:
          name: ubuntu_generated
          path: dart/native

  build-test-dart-windows:
    name: "windows: Build and test dart bindings"
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - uses: dart-lang/setup-dart@v1

      - name: Fetch remote dart stuff before swift gets installed and confuses dart for some reason
        run: |
          cd dart
          dart pub get

      - uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-5.6.2-release
          tag: 5.6.2-RELEASE

      - name: Compile library
        run: |
          $env:SWIFT_PACKAGE_FORCE_DYNAMIC = '1'
          swift build --product __MODULE_NAME__-iota --configuration release --build-path ./.build/windows-build

      - name: Copy resource
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p dart/native/windows
          cp .build/windows-build/x86_64-unknown-windows-msvc/release/__MODULE_NAME__.dll dart/native/windows
          cp .build/windows-build/x86_64-unknown-windows-msvc/release/__MODULE_NAME__-iota.dll dart/native/windows


      - name: Test library from dart
        run: |
          cd dart

          dart run fishyjoes_dart:setup
          dart run build_runner build

          # Someone who understands windows better than I do is welcome to fix this in a better way
          $env:PATH = "$pwd\native\windows;$env:PATH"
          dart test

      - name: Upload library
        uses: actions/upload-artifact@v2
        with:
          name: windows_generated
          path: dart/native

  dart-publish:
    name: "Publish dart package"
    runs-on: ubuntu-latest
    needs:
      - build-test-dart-mac
      - build-test-dart-linux
      - build-test-dart-windows
    env:
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser
      GITHUB_PUBLISH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Configure build environment
        run: |
          set -euxo pipefail
          sudo apt-get install zsh

      - name: Retrieve Artifacts
        uses: actions/download-artifact@v2

      - name: Install Artifacts
        shell: zsh {0}
        run: |
          set -euxo pipefail

          ls *

          rm -rf dart/native
          mkdir -p dart/native
          mv mac_generated/macos dart/native/
          mv ubuntu_generated/linux dart/native/
          mv windows_generated/windows dart/native/

          ls -R dart/

      - name: Determine version
        shell: zsh {0}
        run: |
          set -euxo pipefail

          VERSION=${GITHUB_REF#refs/*/}
          if [[ ! $VERSION =~ [0-9]+\.[0-9]+\.[0-9]+ ]]; then
              VERSION="0.0.1-$(git rev-parse --short HEAD)"
          fi
          echo "Detected Version is '$VERSION'"
          echo VERSION=$VERSION >> $GITHUB_ENV

      - name: Pack
        shell: zsh {0}
        run: |
          set -euxo pipefail

          tar -cvzf __MODULE_NAME__-dart-binaries.tgz -C dart native

      - name: Upload result
        uses: actions/upload-artifact@v2
        with:
          name: __MODULE_NAME__-dart-binaries.tgz
          path: __MODULE_NAME__-dart-binaries.tgz

      - name: Publish
        shell: zsh {0}
        if: github.event_name == 'release'
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euxo pipefail


          releaseID=$(
              gh api \
              -H "Accept: application/vnd.github.v3+json" \
              "/repos/$OWNER/$REPO/releases/tags/$TAG_NAME" \
              -q .id
          )

          file=__MODULE_NAME__-dart-binaries.tgz

          # https://docs.github.com/en/rest/releases/assets#upload-a-release-asset
          curl -f -u "$GITHUB_USER:$GITHUB_PUBLISH_TOKEN" \
            -X POST \
            -H 'Content-Type: application/gzip' \
            -H 'Accept: application/vnd.github.v3+json' \
            "https://uploads.github.com/repos/$OWNER/$REPO/releases/$releaseID/assets?name=$file" \
            --data-binary @$file
