---
name: Kotlin

"on":
  workflow_dispatch:
  push:
    branches: [main]
  label:
    types: [created]
  pull_request:
  release:
    types: [published]

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  JDK_VERSION: 11
  GRADLE_OPTS: -Dorg.gradle.daemon=false
  GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
  GITHUB_USER: cricut-builduser

jobs:
  build-test-kotlin-mac:
    name: "mac: Build and test kotlin bindings"
    runs-on: macOS-12

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup JDK 1.11
        uses: actions/setup-java@v1
        with:
          java-version: 1.11

      - name: Build library
        shell: zsh {0}
        run: |
          set -euxo pipefail

          swift run -- fishy-joes --kotlin-fast --fat generate build

      - name: Test from gradle
        shell: zsh {0}
        run: |
          set -euxo pipefail
          swift run -- fishy-joes --kotlin-fast --fat test

      - name: Upload artifacts
        uses: actions/upload-artifact@v2
        with:
          name: mac_lib
          path: kotlin/src/generated/resources/mac/

  build-test-kotlin-linux:
    name: "linux: Build and test kotlin bindings"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cricut/android-swift-runtime:1.0.0
      credentials:
        username: cricut-builduser
        password: ${{ secrets.CRICUT_GPR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup JDK 1.11
        uses: actions/setup-java@v1
        with:
          java-version: 1.11

      - name: Build library
        shell: zsh {0}
        run: |
          set -euxo pipefail

          swift run -- fishy-joes --kotlin build --no-use-docker

      - name: Test from gradle
        shell: zsh {0}
        run: |
          set -euxo pipefail
          swift run -- fishy-joes --kotlin test --no-use-docker

      - name: Upload library
        uses: actions/upload-artifact@v2
        with:
          name: ubuntu_generated
          path: kotlin/src/generated

  build-test-kotlin-windows:
    name: "windows: Build and test kotlin bindings"
    runs-on: windows-2019
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup JDK 1.11
        uses: actions/setup-java@v1
        with:
          java-version: 1.11

      - uses: MaxDesiatov/swift-windows-action@v1
        with:
          shell-action: |
            $env:SWIFT_PACKAGE_FORCE_DYNAMIC = '1'
            swift build --product __MODULE_NAME__-java --configuration release --build-path ./.build/windows-build
          swift-version: "5.4.2"

      - name: Copy resource
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p kotlin/src/generated/resources/windows
          cp .build/windows-build/x86_64-unknown-windows-msvc/release/__MODULE_NAME__.dll kotlin/src/generated/resources/windows
          cp .build/windows-build/x86_64-unknown-windows-msvc/release/__MODULE_NAME__-java.dll kotlin/src/generated/resources/windows

      - name: Test from gradle
        shell: pwsh
        run: |
          cd kotlin
          .\gradlew test

      - name: Upload library
        uses: actions/upload-artifact@v2
        with:
          name: windows_lib
          path: kotlin/src/generated/resources/windows/

  kotlin-publish:
    name: Publish kotlin package
    runs-on: ubuntu-latest
    needs: [build-test-kotlin-mac, build-test-kotlin-linux, build-test-kotlin-windows]
    if: success()
    env:
      GITHUB_PUBLISH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup JDK 1.11
        uses: actions/setup-java@v1
        with:
          java-version: 1.11

      - name: Configure build environment
        run: |
          set -euxo pipefail
          sudo apt-get install zsh

      - name: Retrieve Artifacts
        uses: actions/download-artifact@v2

      - name: Install Artifacts
        shell: zsh {0}
        run: |
          set -euxo pipefail

          ls *

          rm -rf kotlin/src/generated
          mv ubuntu_generated kotlin/src/generated
          mkdir -p kotlin/src/generated/resources/{mac,windows}
          mv mac_lib/lib*.dylib kotlin/src/generated/resources/mac/
          mv windows_lib/*.dll kotlin/src/generated/resources/windows/

      - name: Test publish
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd kotlin
          ./gradlew publishToMavenLocal

      - name: Publish
        shell: zsh {0}
        if: github.event_name == 'release'
        run: |
          set -euxo pipefail

          VERSION=${GITHUB_REF#refs/*/}
          if [[ ! $VERSION =~ [0-9]+\.[0-9]+\.[0-9]+ ]]; then
              VERSION="0.0.1"
          fi

          cd kotlin

          echo "Detected Version is '$VERSION'"
          export VERSION
          ./gradlew updateVersion
          ./gradlew build publish
