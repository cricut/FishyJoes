[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cricut-__LOWERCASE_MODULE_NAME__"
version = "0.0.1"
description = "__MODULE_NAME__ Python bindings generated by FishyJoes"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fishyjoes_python>=0.1.0",
__PYPROJECT_DEPENDENCIES__
]
authors = [
  { name = "Cricut Inc." },
]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Typing :: Typed",
]

[project.optional-dependencies]
test = [
  "pytest>=8",
]

[tool.setuptools]
include-package-data = true
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"cricut___LOWERCASE_MODULE_NAME__" = ["py.typed", "lib/*.dll", "lib/*.dylib", "lib/*.so"]

[tool.pytest.ini_options]
testpaths = ["tests"]
