---
# __AUTOGEN_WARNING__

name: "Dart"

"on":
  workflow_dispatch:
  label:
    types: [created]
  pull_request:
  release:
    types: [published]

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  __CI_SHARED_ENV_YAML__

jobs:
  build-test-dart-mac:
    name: "macOS: Build and test dart bindings"
    runs-on: __CI_RUNNER_MACOS__
    steps:
      - __CI_GIT_STEPS__

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://npm.pkg.github.com/'

      - uses: dart-lang/setup-dart@v1

      - name: Install generation tools
        shell: zsh {0}
        run: |
          yq --version || brew install yq
          mint --version || brew install mint

      - name: Pre-build hook
        shell: bash
        run: __PRE_BUILD_HOOK_YAML__

      - name: Build library
        shell: zsh {0}
        run: |
          set -euxo pipefail

          swift run -- fishy-joes --dart --fat generate build

      - name: Test library from dart
        shell: zsh {0}
        run: |
          set -euxo pipefail

          swift run -- fishy-joes --dart --fat test

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mac_lib
          path: bindings/dart/generated/macos/native/
          if-no-files-found: error

  build-test-dart-linux:
    name: "Ubuntu: Build and test dart bindings"
    runs-on: __CI_RUNNER_UBUNTU__
    steps:
      - __CI_GIT_STEPS__

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://npm.pkg.github.com/'

      - uses: dart-lang/setup-dart@v1

      - name: Configure build environment
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y zsh

      - name: Pre-build hook
        shell: bash
        run: __PRE_BUILD_HOOK_YAML__

      - name: Build library
        shell: zsh {0}
        run: |
          set -euxo pipefail

          swift run -- fishy-joes --dart build

      - name: Patch libs to use relative paths to swift stdlib
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd bindings/dart/generated/linux/native

          SWIFT_RUN_PATH='$ORIGIN:/usr/lib/swift/linux:./'
          for LIB in lib*.so*; do
            patchelf --set-rpath $SWIFT_RUN_PATH $LIB
          done

      - name: Test library from dart
        shell: zsh {0}
        run: |
          set -euxo pipefail

          swift run -- fishy-joes --dart test

      - name: Upload library
        uses: actions/upload-artifact@v7
        with:
          name: ubuntu_lib
          path: bindings/dart/generated/linux/native/
          if-no-files-found: error

  build-test-dart-windows:
    name: "Windows: Build and test dart bindings"
    runs-on: __CI_RUNNER_WINDOWS__
    steps:
      - name: Configure git and vcpkg
        shell: pwsh
        run: |
          git config --system core.longpaths true
          echo "VCPKG_ROOT=$(Split-Path -Parent $((gcm vcpkg).Path))" >> $env:GITHUB_ENV

      - __CI_GIT_STEPS__

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://npm.pkg.github.com/'

      - uses: dart-lang/setup-dart@v1

      - uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-6.2-release
          tag: 6.2-RELEASE

      - name: Pre-resolve required swiftpm packages & fetch fishyjoes scripts
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = 'SilentlyContinue'
          swift package resolve
          swift package resolve
          swift package resolve
          echo SWIFT_WINDOWS_BASH=".build/checkouts/FishyJoes/scripts/swift-shim.ps1" >> $env:GITHUB_ENV

      - name: Pre-build hook
        shell: bash
        run: __PRE_BUILD_HOOK_YAML__

      - name: Build library
        shell: bash
        run: |
          set -euxo pipefail

          "$SWIFT_WINDOWS_BASH" run -- fishy-joes --dart build

      - name: Test library from dart
        shell: bash
        run: |
          set -euxo pipefail

          # Add dart DLLs to path
          # Someone who understands windows better than I do is welcome to fix this in a better way
          PATH="$(pwd)/bindings/dart/generated/windows/native:$PATH"

          "$SWIFT_WINDOWS_BASH" run -- fishy-joes --dart test

      - name: Upload library
        uses: actions/upload-artifact@v7
        with:
          name: windows_lib
          path: bindings/dart/generated/windows/native/
          if-no-files-found: error

  dart-publish:
    name: "Publish dart packages"
    runs-on: __CI_RUNNER_UBUNTU__
    needs:
      - build-test-dart-mac
      - build-test-dart-linux
      - build-test-dart-windows
    permissions:
      contents: write
      packages: write
    steps:
      - __CI_GIT_STEPS__

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://npm.pkg.github.com/'

      - name: Configure build environment
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y zsh

      - name: Retrieve artifacts
        uses: actions/download-artifact@v4

      - name: Install artifacts
        shell: zsh {0}
        run: |
          set -euxo pipefail

          rm -rf bindings/dart/generated/{macos,linux,windows}/native
          # mkdir -p bindings/dart/generated/{macos,linux,windows}/native
          mv mac_lib bindings/dart/generated/macos/native
          mv ubuntu_lib bindings/dart/generated/linux/native
          mv windows_lib bindings/dart/generated/windows/native

      - name: Determine version
        shell: zsh {0}
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euxo pipefail

          SEMVER_REGEX='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'

          if [[ "$GITHUB_EVENT_NAME" == "release" ]]; then
              VERSION="$RELEASE_TAG"
          else
              VERSION=${GITHUB_REF#refs/*/}
          fi

          if [[ ! $VERSION =~ $SEMVER_REGEX ]]; then
            if [[ "$GITHUB_EVENT_NAME" == "release" ]]; then
              echo "Unsupported release tag '$VERSION'" >&2
              exit 1
            fi

              VERSION="0.0.1-$(git rev-parse --short HEAD)"
          fi

          echo "Detected Version is '$VERSION'"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "PUBLISH_TAG=$VERSION-dart-publish" >> $GITHUB_ENV

      - name: Pack
        shell: zsh {0}
        run: |
          set -euxo pipefail

          swift run fishy-joes pack --dart --version=$VERSION

          tar -tf bindings/packed-npm-packages/cricut-flutter-*.tgz

      - name: Checkout with release token
        if: github.event_name == 'release'
        uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          ref: ${{ github.event.release.tag_name }}
          clean: false

      - name: Prepare Dart publish tag
        if: github.event_name == 'release'
        shell: zsh {0}
        run: |
          set -euxo pipefail

          yq -i '.version = strenv(VERSION)' bindings/dart/generated/pubspec.yaml

          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR_ID+$GITHUB_ACTOR@users.noreply.github.com"
          git add bindings/dart/generated/pubspec.yaml

          if git diff --cached --quiet; then
              echo "bindings/dart/generated/pubspec.yaml already has version '$VERSION'"
          else
              git commit -m "chore: prepare Dart publish tag for $VERSION"
          fi

          git tag "$PUBLISH_TAG"
          git show --stat --oneline --decorate HEAD
          git rev-parse "$PUBLISH_TAG"

          echo "Publish tag '$PUBLISH_TAG' prepared locally"

      - name: Push Dart publish tag
        if: github.event_name == 'release'
        shell: zsh {0}
        run: |
          set -euxo pipefail

          if git ls-remote --exit-code --tags origin "refs/tags/$PUBLISH_TAG" >/dev/null 2>&1; then
              echo "Publish tag '$PUBLISH_TAG' already exists"
              exit 0
          fi

          git push origin "refs/tags/$PUBLISH_TAG"

      - name: Upload result
        uses: actions/upload-artifact@v7
        with:
          name: __MODULE_NAME__-dart-binaries.tgz
          path: bindings/dart/generated/packages/__MODULE_NAME__-dart-binaries.tgz
          if-no-files-found: error

      - name: Publish
        shell: zsh {0}
        if: github.event_name == 'release'
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail

          releaseID=$(
              gh api \
              -H "Accept: application/vnd.github.v3+json" \
              "/repos/$OWNER/$REPO/releases/tags/$TAG_NAME" \
              -q .id
          )

          tarballName=__MODULE_NAME__-dart-binaries.tgz
          tarballPath=bindings/dart/generated/packages/$tarballName

          # Publish pure-dart tarball as a release artifact
          # https://docs.github.com/en/rest/releases/assets#upload-a-release-asset
          curl -f \
            -X POST \
            -H 'Content-Type: application/gzip' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github.v3+json' \
            "https://uploads.github.com/repos/$OWNER/$REPO/releases/$releaseID/assets?name=$tarballName" \
            --data-binary @$tarballPath

          # publish flutter NPM package
          npm publish bindings/packed-npm-packages/cricut-flutter-*.tgz
