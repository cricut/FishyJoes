---
# __AUTOGEN_WARNING__

name: "Dart"

"on":
  workflow_dispatch:
  push:
    tags:
      - '*-dart-publish'
  label:
    types: [created]
  pull_request:
  release:
    types: [published]

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  NODE_AUTH_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
  GITHUB_USER: cricut-builduser
  FISHYJOES: 1

jobs:
  build-test-dart-mac:
    name: "macOS: Build and test dart bindings"
    if: github.event_name != 'release'
    runs-on: sojo-macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.CRICUT_GPR_TOKEN }}

      - name: Setup git credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - uses: dart-lang/setup-dart@v1

      - name: Install generation tools
        shell: zsh {0}
        run: |
          yq --version || brew install yq
          mint --version || brew install mint

      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@cricut'

      - name: Pre-build hook
        shell: bash
        run: __PRE_BUILD_HOOK_YAML__

      - name: Build library
        shell: zsh {0}
        run: |
          set -euxo pipefail

          swift run -- fishy-joes --dart --fat generate build

      - name: Test library from dart
        shell: zsh {0}
        run: |
          set -euxo pipefail

          swift run -- fishy-joes --dart --fat test

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac_lib
          path: bindings/dart/generated/macos/native/
          if-no-files-found: error

  build-test-dart-linux:
    name: "Ubuntu: Build and test dart bindings"
    if: github.event_name != 'release'
    runs-on: k8s
    container:
      image: __LINUX_CONTAINER_SPEC__
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.CRICUT_GPR_TOKEN }}

      - name: Setup Git Credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - uses: dart-lang/setup-dart@v1

      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@cricut'

      - name: Pre-build hook
        shell: bash
        run: __PRE_BUILD_HOOK_YAML__

      - name: Build library
        shell: zsh {0}
        run: |
          set -euxo pipefail

          swift run -- fishy-joes --dart build

      - name: Patch libs to use relative paths to swift stdlib
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd bindings/dart/generated/linux/native

          SWIFT_RUN_PATH='$ORIGIN:/usr/lib/swift/linux:./'
          for LIB in lib*.so*; do
            patchelf --set-rpath $SWIFT_RUN_PATH $LIB
          done

      - name: Test library from dart
        shell: zsh {0}
        run: |
          set -euxo pipefail

          swift run -- fishy-joes --dart test

      - name: Upload library
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu_lib
          path: bindings/dart/generated/linux/native/
          if-no-files-found: error

  build-test-dart-windows:
    name: "Windows: Build and test dart bindings"
    if: github.event_name != 'release'
    runs-on: windows-2025
    steps:
      - name: Configure git and vcpkg
        shell: pwsh
        run: |
          git config --system core.longpaths true
          echo "VCPKG_ROOT=$(Split-Path -Parent $((gcm vcpkg).Path))" >> $env:GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.CRICUT_GPR_TOKEN }}

      - name: Setup git credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - uses: dart-lang/setup-dart@v1

      - uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-6.2-release
          tag: 6.2-RELEASE

      - name: Pre-resolve required swiftpm packages & fetch fishyjoes scripts
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = 'SilentlyContinue'
          swift package resolve
          swift package resolve
          swift package resolve
          echo SWIFT_WINDOWS_BASH=".build/checkouts/FishyJoes/scripts/swift-shim.ps1" >> $env:GITHUB_ENV

      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@cricut'

      - name: Pre-build hook
        shell: bash
        run: __PRE_BUILD_HOOK_YAML__

      - name: Build library
        shell: bash
        run: |
          set -euxo pipefail

          "$SWIFT_WINDOWS_BASH" run -- fishy-joes --dart build

      - name: Test library from dart
        shell: bash
        run: |
          set -euxo pipefail

          # Add dart DLLs to path
          # Someone who understands windows better than I do is welcome to fix this in a better way
          PATH="$(pwd)/bindings/dart/generated/windows/native:$PATH"

          "$SWIFT_WINDOWS_BASH" run -- fishy-joes --dart test

      - name: Upload library
        uses: actions/upload-artifact@v4
        with:
          name: windows_lib
          path: bindings/dart/generated/windows/native/
          if-no-files-found: error

  prepare-dart-publish-tag:
    name: "Prepare dart publish tag"
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.CRICUT_GPR_TOKEN }}

      - name: Setup git credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@cricut'

      - name: Configure build environment
        run: |
          set -euxo pipefail

          sudo apt-get install -y zsh

      - name: Determine publish tag
        id: version
        shell: zsh {0}
        run: |
          set -euxo pipefail

          VERSION="${{ github.event.release.tag_name }}"
          if [[ ! $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
              echo "Unsupported release tag '$VERSION'" >&2
              exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "publish_tag=$VERSION-dart-publish" >> $GITHUB_OUTPUT

      - name: Check for existing publish tag
        id: publish-tag
        shell: zsh {0}
        run: |
          set -euxo pipefail

          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.publish_tag }}" >/dev/null 2>&1; then
              echo "exists=true" >> $GITHUB_OUTPUT
          else
              echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create publish tag commit
        if: steps.publish-tag.outputs.exists != 'true'
        shell: zsh {0}
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PUBLISH_TAG: ${{ steps.version.outputs.publish_tag }}
        run: |
          set -euxo pipefail

          yq -i '.version = strenv(VERSION)' bindings/dart/generated/pubspec.yaml
          git config user.name "$GITHUB_USER"
          git config user.email "cricut-builduser@users.noreply.github.com"
          git add bindings/dart/generated/pubspec.yaml
          git commit -m "chore: prepare dart publish tag for $VERSION"
          git tag "$PUBLISH_TAG"

      - name: Push publish tag
        if: steps.publish-tag.outputs.exists != 'true'
        shell: zsh {0}
        env:
          PUBLISH_TAG: ${{ steps.version.outputs.publish_tag }}
        run: |
          set -euxo pipefail

          git push origin "refs/tags/$PUBLISH_TAG"

  dart-publish:
    name: "Publish dart packages"
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs:
      - build-test-dart-mac
      - build-test-dart-linux
      - build-test-dart-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.CRICUT_GPR_TOKEN }}

      - name: Setup git credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@cricut'

      - name: Configure build environment
        run: |
          set -euxo pipefail

          sudo apt-get install -y zsh

      - name: Retrieve artifacts
        uses: actions/download-artifact@v4

      - name: Install artifacts
        shell: zsh {0}
        run: |
          set -euxo pipefail

          rm -rf bindings/dart/generated/{macos,linux,windows}/native
          mv mac_lib bindings/dart/generated/macos/native
          mv ubuntu_lib bindings/dart/generated/linux/native
          mv windows_lib bindings/dart/generated/windows/native

      - name: Determine version
        shell: zsh {0}
        run: |
          set -euxo pipefail

          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME%-dart-publish}
          if [[ "$VERSION" == "$TAG_NAME" ]]; then
              echo "Publish tag '$TAG_NAME' is missing the -dart-publish suffix" >&2
              exit 1
          fi
          if [[ ! $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
              echo "Unsupported release tag '$VERSION'" >&2
              exit 1
          fi
          echo "Detected Version is '$VERSION'"
          echo VERSION=$VERSION >> $GITHUB_ENV

      - name: Pack
        shell: zsh {0}
        run: |
          set -euxo pipefail

          swift run fishy-joes pack --dart --version=$VERSION

          tar -tf bindings/packed-npm-packages/cricut-flutter-*.tgz

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: __MODULE_NAME__-dart-binaries.tgz
          path: bindings/dart/generated/packages/__MODULE_NAME__-dart-binaries.tgz
          if-no-files-found: error

      - name: Publish
        shell: zsh {0}
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PUBLISH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail

          releaseID=$(
              gh api \
              -H "Accept: application/vnd.github.v3+json" \
              "/repos/$OWNER/$REPO/releases/tags/$VERSION" \
              -q .id
          )

          tarballName=__MODULE_NAME__-dart-binaries.tgz
          tarballPath=bindings/dart/generated/packages/$tarballName

          # Publish pure-dart tarball as a release artifact
          # https://docs.github.com/en/rest/releases/assets#upload-a-release-asset
          curl -f -u "$GITHUB_USER:$GITHUB_PUBLISH_TOKEN" \
            -X POST \
            -H 'Content-Type: application/gzip' \
            -H 'Accept: application/vnd.github.v3+json' \
            "https://uploads.github.com/repos/$OWNER/$REPO/releases/$releaseID/assets?name=$tarballName" \
            --data-binary @$tarballPath

          # publish flutter NPM package
          npm publish bindings/packed-npm-packages/cricut-flutter-*.tgz
