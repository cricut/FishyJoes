---
# __AUTOGEN_WARNING__

name: "regenerate-check"

"on":
  workflow_dispatch:
  pull_request:

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  GITHUB_USER: cricut-builduser
  GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
  FISHYJOES: 1

jobs:
  regenerate-check:
    name: "macOS: regenerate check"
    runs-on: sojo-macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.CRICUT_GPR_TOKEN }}

      - name: Setup git credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Install generation tools
        shell: zsh {0}
        run: |
          yq --version || brew install yq
          mint --version || brew install mint

      - name: Ensure re-generating does not change committed generated code
        shell: zsh {0}
        run: |
          set -euo pipefail

          swift run -- fishy-joes generate

          if [ ! -z "$(git status --porcelain .)" ]; then
            git diff
            git status
            echo '::error:: generation modified sources'
            echo '::error::   run `FISHYJOES=1 swift run fishy-joes generate` from root of repository and re-commit'
            exit 1
          fi
