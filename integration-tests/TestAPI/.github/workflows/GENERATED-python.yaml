  PIP_NO_CACHE_DIR: "1"

jobs:
  build-test-python-mac:
    name: "macOS Python ${{ matrix.python-version }}: build, test, pack"
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.11'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install generation tools
        shell: zsh {0}
        run: |
          set -euxo pipefail
          yq --version || brew install yq
          mint --version || brew install mint

      - name: Pre-build hook
        shell: bash
        run: |
          # Build customization can be added here with the `CIPreBuildHook` key in fishy-joes.yaml

      - name: Build, test, and pack Python wheel
        shell: zsh {0}
        run: |
          set -euxo pipefail
          swift run -- fishy-joes --python --fat generate build test pack

      - name: Build FishyJoes Python runtime wheel
        shell: bash
        run: |
          set -euxo pipefail
          runtime_dir=""
          for candidate in \
            "python-runtime" \
            "../python-runtime" \
            "../../python-runtime" \
            ".build/checkouts/FishyJoes/python-runtime" \
            "bindings/swift-interfaces/generated/TestAPI-bindings/.build/checkouts/FishyJoes/python-runtime"
          do
            if [[ -f "$candidate/_build_wheel.py" ]]; then
              runtime_dir="$candidate"
              break
            fi
          done
          if [[ -z "$runtime_dir" ]]; then
            runtime_dir="$(find . -path '*/FishyJoes/python-runtime/_build_wheel.py' -print -quit | sed 's#/_build_wheel.py$##')"
          fi
          if [[ -z "$runtime_dir" ]]; then
            echo "Could not locate FishyJoes python-runtime checkout"
            exit 1
          fi
          runtime_native_library="$(find .build -name 'libFishyJoesIotaRuntime.*' -o -name 'FishyJoesIotaRuntime.dll' | grep -E '(dylib|so|dll)$' | head -n 1)"
          if [[ -z "$runtime_native_library" ]]; then
            echo "Could not locate FishyJoesIotaRuntime native library"
            exit 1
          fi
          python "$runtime_dir/_build_wheel.py" --outdir bindings/python/dist --native-library "$runtime_native_library"

      - name: Verify clean wheel install
        shell: bash
        run: |
          set -euxo pipefail
          python -m venv bindings/python/.wheel-test-venv
          if [[ -x bindings/python/.wheel-test-venv/Scripts/python.exe ]]; then
            venv_python="bindings/python/.wheel-test-venv/Scripts/python.exe"
          else
            venv_python="bindings/python/.wheel-test-venv/bin/python"
          fi
          "$venv_python" -m pip install --upgrade pip
          "$venv_python" -m pip install cffi packaging
          "$venv_python" -m pip install --no-index --find-links bindings/python/dist bindings/python/dist/*.whl
          PYTHONPATH= "$venv_python" -c "import testapi as package; assert package.SUPPORTED; print(package.diagnostics())"
          # The wheel was already clean-installed above (--no-index, runtime deps only),
          # proving the minimal install works. The suite includes tooling tests (mypy
          # type-check, native-repair introspection), so install the dev tools they need
          # before running the full suite against the installed wheel.
          "$venv_python" -m pip install -r bindings/python/requirements-dev.txt
          PYTHONPATH= "$venv_python" -m unittest discover -v -s bindings/python/tests

      - name: Verify native wheel repair
        shell: bash
        run: |
          set -euxo pipefail
          test -f bindings/python/dist/native-repair-report-darwin.txt
          cat bindings/python/dist/native-repair-report-darwin.txt

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: python-macos-${{ matrix.python-version }}-wheel
          path: bindings/python/dist/*.whl
          if-no-files-found: error

      - name: Upload native repair report
        uses: actions/upload-artifact@v7
        with:
          name: python-macos-${{ matrix.python-version }}-native-report
          path: bindings/python/dist/native-repair-report-*.txt
