name: "Python"

"on":
  workflow_dispatch:
  label:
    types: [created]
  pull_request:
  release:
    types: [published]

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

