name: "Integration tests"
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  integration-tests-mac:
    name: "mac: integration tests"
    runs-on: macOS-11.0
    env:
      JDK_VERSION: 11
      GRADLE_OPTS: -Dorg.gradle.daemon=false
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup JDK 1.11
        uses: actions/setup-java@v1
        with:
          java-version: 1.11

      - name: Setup Node
        uses: actions/setup-node@v1
        with:
          node-version: '16.x'
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@cricut'

      - name: Generate
        shell: zsh {0}
        run: |
          set -euxo pipefail
          cd integration-tests/TestAPI-bindings

          swift run -- fishy-joes generate

      - name: Test from node
        shell: zsh {0}
        run: |
          set -euxo pipefail
          cd integration-tests/TestAPI-bindings

          npm install

          swift run -- fishy-joes --nodejs generate build test

      - name: Build library
        shell: zsh {0}
        run: |
          set -euxo pipefail

          (cd kotlin-runtime; ./gradlew publishToMavenLocal)

          cd integration-tests/TestAPI-bindings
          swift run -- fishy-joes --kotlin-fast generate build test

  integration-tests-linux:
    name: "linux: integration tests"
    env:
      JDK_VERSION: 11
      GRADLE_OPTS: -Dorg.gradle.daemon=false
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser
      SWIFT_WASM_URL: |-
        https://github.com/swiftwasm/swift/releases/download/swift-wasm-5.4.0-RELEASE/swift-wasm-5.4.0-RELEASE-ubuntu20.04_x86_64.tar.gz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup Node
        uses: actions/setup-node@v1
        with:
          node-version: '16.x'
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@cricut'

      - name: Setup JDK 1.11
        uses: actions/setup-java@v1
        with:
          java-version: 1.11

      - name: Configure build environment
        run: |
          set -euxo pipefail

          sudo apt-get install zsh

          curl -Lo swift-wasm.tgz $SWIFT_WASM_URL
          sudo mkdir -p /Library/Developer/Toolchains/swift-wasm-5.4.0-RELEASE.xctoolchain
          sudo tar -xf swift-wasm.tgz -C /Library/Developer/Toolchains/swift-wasm-5.4.0-RELEASE.xctoolchain --strip-components 1

      - name: Test from node
        shell: zsh {0}
        run: |
          set -euxo pipefail
          cd integration-tests/TestAPI-bindings

          npm install

          swift run -- fishy-joes --nodejs --wasm build test

      - name: Test from gradle
        shell: zsh {0}
        run: |
          set -euxo pipefail

          (cd kotlin-runtime; ./gradlew publishToMavenLocal)

          cd integration-tests/TestAPI-bindings
          swift run -- fishy-joes --kotlin-fast build test
