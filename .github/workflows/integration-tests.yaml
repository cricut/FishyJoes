---
name: "Integration Tests"

"on":
  workflow_dispatch:
  push:
    branches:
      - main
  label:
    types:
      - created
  pull_request:

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '20'
  NODE_VERSION: '18.x'
  DOTNET_VERSION: '8.0.x'
  GITHUB_USER: ${{ github.actor }}
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  integration-tests-mac:
    name: "macOS: Integration tests"
    runs-on: macos-26
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false
      CONFIGURATION: debug
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: zulu

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://npm.pkg.github.com/'

      - name: Set up dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: dart-lang/setup-dart@v1

      - name: Install generation tools
        shell: zsh {0}
        run: |
          set -euo pipefail

          swift run fishy-joes install-system-dependencies for-generation

      - name: Ensure re-generating does not change committed generated code
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd integration-tests/TestAPI

          FISHYJOES=1 swift run -- fishy-joes generate

          if [ -n "$(git status --porcelain .)" ]; then
            echo '::error:: generation modified sources'
            echo '::error::   run `FISHYJOES=1 swift run -- fishy-joes generate` from integration-tests/TestAPI and re-commit'
            git diff
            git status
            exit 1
          fi

      - name: Build FishyJoesNodeRuntime
        shell: zsh {0}
        run: |
          set -euxo pipefail

          ./scripts/compile-node-runtime.sh

      - name: Test TypeScript from npm via fishy-joes
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd integration-tests/TestAPI
          FISHYJOES=1 swift run -- fishy-joes --nodejs build test

      - name: Build FishyJoesIotaRuntime
        shell: zsh {0}
        run: |
          set -euxo pipefail

          ./scripts/compile-iota-runtime.sh

      - name: Test C♯ from dotnet via fishy-joes
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd integration-tests/TestAPI
          FISHYJOES=1 swift run -- fishy-joes --c-sharp build test

      - name: Test Dart from dart via fishy-joes
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd integration-tests/TestAPI
          FISHYJOES=1 swift run -- fishy-joes --dart build test

      - name: Build FishyJoesJavaRuntime
        shell: zsh {0}
        run: |
          set -euxo pipefail

          libdir=kotlin-runtime/src/generated/resources/mac
          rm -rf $libdir
          mkdir -p $libdir
          ./scripts/compile-kotlin-native-runtime.sh
          (cd kotlin-runtime && ./gradlew publishToMavenLocal)

      - name: Test kotlin from gradle via fishy-joes
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd integration-tests/TestAPI
          FISHYJOES=1 swift run -- fishy-joes --kotlin-fast build test

  integration-tests-ubuntu-and-android:
    name: "Ubuntu/Android: Integration tests"
    runs-on: ubuntu-22.04
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false
      CONFIGURATION: debug

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: zulu

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://npm.pkg.github.com/'

      - name: Set up dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: dart-lang/setup-dart@v1

      - name: Configure build environment
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y zsh libcurl4-openssl-dev pkg-config python3-lldb-13

          swift run fishy-joes install-system-dependencies for-wasm for-android

          source ~/.local/share/swiftly/env.sh
          echo "SWIFTLY_HOME_DIR=$SWIFTLY_HOME_DIR" >> "$GITHUB_ENV"
          echo "$SWIFTLY_BIN_DIR" >> "$GITHUB_PATH"

          swiftly install 6.2.4
          swiftly use -y 6.2.4

      - name: Build FishyJoesNodeRuntime
        shell: zsh {0}
        run: |
          set -euxo pipefail

          ./scripts/compile-node-runtime.sh

      - name: Test TypeScript from npm via FishyJoes
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd integration-tests/TestAPI
          FISHYJOES=1 swift run -- fishy-joes --nodejs --wasm build test

      - name: Build FishyJoesIotaRuntime
        shell: zsh {0}
        run: |
          set -euxo pipefail

          ./scripts/compile-iota-runtime.sh

      - name: Test C♯ from dotnet via fishy-joes
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd integration-tests/TestAPI
          FISHYJOES=1 swift run -- fishy-joes --c-sharp build test

      - name: Test Dart from dart via fishy-joes
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd integration-tests/TestAPI
          FISHYJOES=1 swift run -- fishy-joes --dart build test

      - name: Build FishyJoesJavaRuntime
        shell: zsh {0}
        run: |
          set -euxo pipefail

          libdir=kotlin-runtime/src/generated/resources/linux
          rm -rf $libdir
          mkdir -p $libdir
          ./scripts/compile-kotlin-native-runtime.sh
          ./scripts/compile-android-runtime.sh

      - name: Locally publish kotlin native & android runtimes
        shell: zsh {0}
        run: |
          set -euxo pipefail

          # Publish runtime for the native linux test and the android tests
          (cd kotlin-runtime && ./gradlew publishToMavenLocal)

      - name: Test kotlin from gradle via fishy-joes
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd integration-tests/TestAPI
          FISHYJOES=1 swift run -- fishy-joes --kotlin build test

          # Publish test-api for the android tests to use later
          (cd bindings/kotlin/generated && ./gradlew publishToMavenLocal)

      - name: Build android test app
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd integration-tests/android-test-app
          ./gradlew assembleAndroidTest

      # Android emulator steup needs this
      # https://github.blog/changelog/2023-02-23-hardware-accelerated-android-virtualization-on-actions-windows-and-linux-larger-hosted-runners/
      - name: Enable KVM group perms
        run: |
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm

      - name: Test android test app
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a  # v2.37.0
        with:
          api-level: 29
          arch: x86_64
          # NOTE: each line of this script is executed in its own shell
          script: |
            cd integration-tests/android-test-app && ./gradlew connectedAndroidTest

  integration-tests-windows:
    name: "Windows: Integration tests"
    runs-on: windows-2025
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false
      SWIFT: ${{ github.workspace }}\scripts\swift-shim.ps1
      SWIFT_PACKAGE_RESOLVE: 0
      EXTRA_LIBPATH: '.build\lib'
      CONFIGURATION: debug
      FISHYJOES: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: compnerd/gha-setup-swift@main
        with:
          swift-version: swift-6.2-release
          swift-build: 6.2-RELEASE

      - name: Set up java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: zulu

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://npm.pkg.github.com/'

      - name: Set up dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: dart-lang/setup-dart@v1

      - name: Pre-resolve Required SwiftPM Packages
        continue-on-error: true
        shell: pwsh
        run: |
          Set-PSDebug -Trace 2
          $ErrorActionPreference = 'SilentlyContinue'
          $env:FISHYJOES_DEPENDENCY_FishyJoes = @{local=@{path=$pwd.Path}} | ConvertTo-Json -Compress

          swift package resolve
          swift package resolve
          swift package resolve

          cd integration-tests/TestAPI
          swift package resolve
          swift package resolve
          swift package resolve

          swift package resolve --scratch-path .build/bindings --package-path bindings/swift-interfaces/generated/TestAPI-bindings
          swift package resolve --scratch-path .build/bindings --package-path bindings/swift-interfaces/generated/TestAPI-bindings
          swift package resolve --scratch-path .build/bindings --package-path bindings/swift-interfaces/generated/TestAPI-bindings

          cd ../../node-runtime/register-module-shim
          swift package resolve
          swift package resolve
          swift package resolve

      - name: Build FishyJoesNodeRuntime
        shell: bash
        run: |
          set -euxo pipefail

          ./scripts/compile-node-runtime.sh

      - name: Test TypeScript from npm via fishy-joes
        shell: bash
        run: |
          set -euxo pipefail

          cd integration-tests/TestAPI
          "$SWIFT" run -- fishy-joes --nodejs build test

      - name: Build FishyJoesIotaRuntime
        shell: bash
        run: |
          set -euxo pipefail

          ./scripts/compile-iota-runtime.sh

      - name: Test C♯ from dotnet via fishy-joes
        shell: bash
        run: |
          set -euxo pipefail

          cd integration-tests/TestAPI
          "$SWIFT" run -- fishy-joes --c-sharp build test

      - name: Test Dart from dart via fishy-joes
        shell: bash
        run: |
          set -euxo pipefail

          cd integration-tests/TestAPI

          # Add dart DLLs to path
          # Someone who understands windows better than I do is welcome to fix this in a better way
          PATH="$PWD/bindings/dart/generated/windows/native:$PATH"

          "$SWIFT" run -- fishy-joes --dart build test

      - name: Build FishyJoesJavaRuntime
        shell: bash
        run: |
          set -euxo pipefail

          ./scripts/compile-kotlin-native-runtime.sh
          (cd kotlin-runtime && ./gradlew publishToMavenLocal)

      - name: Test kotlin from gradle via fishy-joes
        shell: bash
        run: |
          set -euxo pipefail

          cd integration-tests/TestAPI
          "$SWIFT" run -- fishy-joes --kotlin-fast build test
