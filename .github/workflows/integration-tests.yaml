name: "Integration tests"
on:
  workflow_dispatch:
  label:
    types:
      - created
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  integration-tests-mac:
    name: "macOS: Integration Tests"
    runs-on: macOS-12
    env:
      JDK_VERSION: 11
      GRADLE_OPTS: -Dorg.gradle.daemon=false
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup JDK 1.11
        uses: actions/setup-java@v1
        with:
          java-version: 1.11

      - name: Setup Node
        uses: actions/setup-node@v1
        with:
          node-version: '16.x'
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@cricut'

      - name: Generate
        shell: zsh {0}
        run: |
          set -euxo pipefail
          cd integration-tests/TestAPI-bindings

          swift run -- fishy-joes generate

      - name: Build Ubuntu FishyJoesNodeRuntime
        shell: zsh {0}
        run: |
          set -euxo pipefail

          libdir=node-runtime/fishyjoes-runtime-native-macos
          rm -rf $libdir
          mkdir -p $libdir
          ./scripts/compile-node-runtime.sh

      - name: Test Node & Wasm
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd integration-tests/TestAPI-bindings
          npm install
          swift run -- fishy-joes --nodejs --wasm generate build test

      - name: Build Ubuntu FishyJoesJavaRuntime
        shell: zsh {0}
        run: |
          set -euxo pipefail

          libdir=kotlin-runtime/src/generated/resources/linux
          rm -rf $libdir
          mkdir -p $libdir
          ./scripts/compile-kotlin-native-runtime.sh
          (cd kotlin-runtime && ./gradlew publishToMavenLocal)

      - name: Test Kotlin
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd integration-tests/TestAPI-bindings
          swift run -- fishy-joes --kotlin-fast generate build test

  integration-tests-ubuntu:
    name: "Ubuntu: Integration Tests"
    env:
      JDK_VERSION: 11
      GRADLE_OPTS: -Dorg.gradle.daemon=false
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser
      SWIFT_WASM_URL: |-
        https://github.com/swiftwasm/swift/releases/download/swift-wasm-5.7.1-RELEASE/swift-wasm-5.7.1-RELEASE-ubuntu20.04_x86_64.tar.gz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Login to github registry
        uses: docker/login-action@v2
        with:
          username: cricut-builduser
          password:  ${{ secrets.CRICUT_GPR_TOKEN }}
          registry: ghcr.io

      - name: Setup Node
        uses: actions/setup-node@v1
        with:
          node-version: '16.x'
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@cricut'

      - name: Setup JDK 1.11
        uses: actions/setup-java@v1
        with:
          java-version: 1.11

      - name: Configure build environment
        run: |
          set -euxo pipefail

          sudo apt-get install zsh

          # Sadly, Ubuntu LTS doesn't have an up-to-date binaryen, so use a wasm version instead
          npm -g install binaryen@111.0.0

          curl -Lo swift-wasm.tgz $SWIFT_WASM_URL
          sudo mkdir -p /Library/Developer/Toolchains/swift-wasm-5.7.1-RELEASE.xctoolchain
          sudo tar -xf swift-wasm.tgz -C /Library/Developer/Toolchains/swift-wasm-5.7.1-RELEASE.xctoolchain --strip-components 1

      - name: Test .NET
        shell: zsh {0}
        run: |
          set -euxo pipefail

          ./scripts/compile-c-sharp-runtime.sh
          cd integration-tests/TestAPI-bindings
          swift run -- fishy-joes --c-sharp build test

      - name: Build Ubuntu FishyJoesNodeRuntime
        shell: zsh {0}
        run: |
          set -euxo pipefail

          libdir=node-runtime/fishyjoes-runtime-native-ubuntu
          rm -rf $libdir
          mkdir -p $libdir
          ./scripts/compile-node-runtime.sh

      #TODO: Wasm
      - name: Test Node & Wasm
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd integration-tests/TestAPI-bindings
          npm install
          #swift run -- fishy-joes --nodejs --wasm build test
          swift run -- fishy-joes --nodejs build test

      - name: Build Ubuntu FishyJoesJavaRuntime
        shell: zsh {0}
        run: |
          set -euxo pipefail

          libdir=kotlin-runtime/src/generated/resources/linux
          rm -rf $libdir
          mkdir -p $libdir
          ./scripts/compile-kotlin-native-runtime.sh
          (cd kotlin-runtime && ./gradlew publishToMavenLocal)

      - name: Test Kotlin
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd integration-tests/TestAPI-bindings
          swift run -- fishy-joes --kotlin-fast build test

          cd kotlin
          ./gradlew publishToMavenLocal

      - name: Upload artifacts
        uses: actions/upload-artifact@v2
        with:
          name: maven-local
          path: ~/.m2/repository

  integration-tests-android:
    name: "Android: Integration Tests"
    needs: [integration-tests-ubuntu]
    runs-on: macOS-12
    env:
      JDK_VERSION: 11
      GRADLE_OPTS: -Dorg.gradle.daemon=false
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup JDK 1.11
        uses: actions/setup-java@v1
        with:
          java-version: 1.11

      - name: Retrieve Artifacts
        uses: actions/download-artifact@v2

      - name: Build Android FishyJoesJavaRuntime
        uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185
        with:
          username: cricut-builduser
          password:  ${{ secrets.CRICUT_GPR_TOKEN }}
          registry: ghcr.io
          image: ghcr.io/cricut/android-swift-runtime:0.1.0
          options: -v ${{ github.workspace }}:/work -w /work
          run: /work/scripts/compile-android-runtime.sh

      - name: Build Android Test App
        shell: zsh {0}
        run: |
          set -euxo pipefail

          ls -la maven-local

          rm -rf ~/.m2/repository
          mkdir -p ~/.m2
          mv maven-local ~/.m2/repository

          cd integration-tests/android-test-app
          ./gradlew assembleAndroidTest

      - name: Test Android
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          # NOTE: each line of this script is executed in its own shell
          script: |
            cd integration-tests/android-test-app && ./gradlew connectedAndroidTest
