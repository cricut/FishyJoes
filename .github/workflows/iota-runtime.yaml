---
name: "Iota Runtime"

"on":
  workflow_dispatch:
  label:
    types:
      - created
  pull_request:
  release:
    types: [published]

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18.x'
  DOTNET_VERSION: '8.0.x'

jobs:
  build-iota-mac:
    name: "macOS: Build Iota Runtime"
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build FishyJoesIotaRuntime
        shell: zsh {0}
        run: |
          set -euxo pipefail

          ./scripts/compile-iota-runtime.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mac_generated
          path: .build/apple/release/libFishyJoesIotaRuntime.dylib
          if-no-files-found: error

  build-iota-ubuntu:
    name: "Ubuntu: Build Iota Runtime"
    runs-on: ubuntu-22.04
    env:
      LIB_DIR: .build/linux-iota-libs
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure build environment
        run: |
          set -eux

          sudo apt-get update
          sudo apt-get install -y zsh

      - name: Build FishyJoesIotaRuntime
        shell: zsh {0}
        run: |
          set -euxo pipefail

          ./scripts/compile-iota-runtime.sh

      - name: Collect libFishyJoesIotaRuntime and its dependencies
        shell: zsh {0}
        run: |
          set -euxo pipefail

          mkdir -p $LIB_DIR

          binPath="$(swift build --configuration release --show-bin-path)"
          cp -dv $binPath/libFishyJoesIotaRuntime.so $LIB_DIR
          FISHYJOES_UBUNTU_DEST=$LIB_DIR ./scripts/copy-linux-swift-stdlib.sh

      - name: Upload library
        uses: actions/upload-artifact@v7
        with:
          name: ubuntu_generated
          path: .build/linux-iota-libs
          if-no-files-found: error

  build-iota-windows:
    name: "Windows: Build Iota Runtime"
    runs-on: windows-2025
    env:
      LIB_DIR: .build/windows-iota-libs
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-6.2-release
          tag: 6.2-RELEASE

      - name: Pre-resolve Required SwiftPM Packages
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = 'SilentlyContinue'
          swift package resolve
          swift package resolve
          swift package resolve

      - name: Build FishyJoesIotaRuntime
        shell: bash
        run: |
          set -euxo pipefail

          ./scripts/compile-iota-runtime.sh

      - name: Collect libFishyJoesIotaRuntime and its dependencies
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p "$LIB_DIR"
          SWIFT_RUNTIME_DIR="$(realpath "$SDKROOT/../../../.." | sed s#Platforms#Runtimes#g)"
          cp -R "$SWIFT_RUNTIME_DIR/usr/bin/"*.dll "$LIB_DIR"

          binPath="$(swift build --configuration release --show-bin-path)"
          cp -R "$binPath/FishyJoesIotaRuntime.dll" "$LIB_DIR"

      - name: Upload library
        uses: actions/upload-artifact@v7
        with:
          name: windows_generated
          path: .build/windows-iota-libs
          if-no-files-found: error

  iota-publish:
    name: "Publish C# Package and Dart Binaries"
    runs-on: ubuntu-22.04
    needs:
      - build-iota-mac
      - build-iota-ubuntu
      - build-iota-windows
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://npm.pkg.github.com/'

      - name: Set up dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Configure build environment
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y zsh

      - name: Retrieve artifacts
        uses: actions/download-artifact@v4

      - name: Install artifacts
        shell: zsh {0}
        run: |
          set -euxo pipefail

          ls *

          rm -rf c-sharp-runtime/runtimes
          mkdir -p c-sharp-runtime/runtimes/{osx,linux,win}/native
          cp -dv mac_generated/* c-sharp-runtime/runtimes/osx/native/
          cp -dv ubuntu_generated/* c-sharp-runtime/runtimes/linux/native/
          cp -dv windows_generated/* c-sharp-runtime/runtimes/win/native/

          ls -R c-sharp-runtime/

          rm -rf dart-runtime/{macos,linux,windows}/native
          mkdir -p dart-runtime/{macos,linux,windows}/native
          cp -dv mac_generated/* dart-runtime/macos/native/
          cp -dv ubuntu_generated/* dart-runtime/linux/native/
          cp -dv windows_generated/* dart-runtime/windows/native/

          ls -R dart-runtime

      - name: Determine version
        shell: zsh {0}
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euxo pipefail

          SEMVER_REGEX='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'

          if [[ "$GITHUB_EVENT_NAME" == "release" ]]; then
              VERSION="$RELEASE_TAG"
          else
              VERSION=${GITHUB_REF#refs/*/}
          fi

          if [[ ! $VERSION =~ $SEMVER_REGEX ]]; then
            if [[ "$GITHUB_EVENT_NAME" == "release" ]]; then
              echo "Unsupported release tag '$VERSION'" >&2
              exit 1
            fi

              VERSION="0.0.1-$(git rev-parse --short HEAD)"
          fi

          echo "Detected Version is '$VERSION'"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "PUBLISH_TAG=$VERSION-dart-publish" >> $GITHUB_ENV

      - name: Prepare Dart publish tag
        if: github.event_name == 'release'
        shell: zsh {0}
        run: |
          set -euxo pipefail

          yq -i '.version = strenv(VERSION)' dart-runtime/pubspec.yaml

          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR_ID+$GITHUB_ACTOR@users.noreply.github.com"
          git add dart-runtime/pubspec.yaml

          if git diff --cached --quiet; then
              echo "dart-runtime/pubspec.yaml already has version '$VERSION'"
          else
              git commit -m "chore: prepare Dart publish tag for $VERSION"
          fi

          git tag "$PUBLISH_TAG"
          git show --stat --oneline --decorate HEAD
          git rev-parse "$PUBLISH_TAG"

          echo "Publish tag '$PUBLISH_TAG' prepared locally"

      - name: Push Dart publish tag
        if: github.event_name == 'release'
        shell: zsh {0}
        run: |
          set -euxo pipefail

          if git ls-remote --exit-code --tags origin "refs/tags/$PUBLISH_TAG" >/dev/null 2>&1; then
              echo "Publish tag '$PUBLISH_TAG' already exists"
              exit 0
          fi

          git push origin "refs/tags/$PUBLISH_TAG"

      - name: Pack
        shell: zsh {0}
        run: |
          set -euxo pipefail

          dotnet pack \
              -c Release \
              c-sharp-runtime/Cricut.FishyJoesRuntime.csproj \
              "/p:Version=$VERSION" \
              --output c-sharp-runtime/nupkgs

          tar -cvzf FishyJoes-dart-binaries.tgz -C dart-runtime {macos,linux,windows}/native

          (
            cd dart-runtime

            rm -rf flutter-package
            mkdir -p flutter-package
            yq '.version = strenv(VERSION)' \
                < npm_flutter_pubspec.yaml \
                > flutter-package/pubspec.yaml

            jq '.version = env.VERSION' < npm_flutter_package.json > flutter-package/package.json
            cp -r lib macos linux windows flutter-package/
          )

          npm pack ./dart-runtime/flutter-package
          ls
          tar -tf cricut-flutter-fishyjoes-runtime-*.tgz

      - name: Upload nuget package
        uses: actions/upload-artifact@v7
        with:
          name: nuget-package
          path: c-sharp-runtime/nupkgs/*.*nupkg
          if-no-files-found: error

      - name: Upload dart tarball
        uses: actions/upload-artifact@v7
        with:
          name: FishyJoes-dart-binaries
          path: FishyJoes-dart-binaries.tgz
          if-no-files-found: error

      - name: Publish
        shell: zsh {0}
        if: github.event_name == 'release'
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail

          # publish C#

          dotnet nuget push ./c-sharp-runtime/nupkgs/*.*nupkg \
            --source https://nuget.pkg.github.com/cricut \
            --api-key $GH_TOKEN \
            --skip-duplicate

          # publish dart

          releaseID=$(
              gh api \
              -H "Accept: application/vnd.github.v3+json" \
              "/repos/$OWNER/$REPO/releases/tags/$TAG_NAME" \
              -q .id
          )

          file=FishyJoes-dart-binaries.tgz

          # https://docs.github.com/en/rest/releases/assets#upload-a-release-asset
          curl -f \
            -X POST \
            -H 'Content-Type: application/gzip' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github.v3+json' \
            "https://uploads.github.com/repos/$OWNER/$REPO/releases/$releaseID/assets?name=$file" \
            --data-binary @$file

          # publish flutter NPM package
          npm publish cricut-flutter-fishyjoes-runtime-*.tgz
