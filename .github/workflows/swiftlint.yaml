name: SwiftLint
on:
  workflow_dispatch:
  label:
    types:
      - created
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v1
      with:
        fetch-depth: 1
    - name: GitHub Action for SwiftLint
      uses: norio-nomura/action-swiftlint@3.2.1
