name: node-runtime

on:
  workflow_dispatch:
  push:
    branches:
      - main
  label:
    types:
      - created
  pull_request:
  release:
    types: [published]

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build-test-node-mac:
    name: "mac: Build and Test Node.js Runtime"
    runs-on: macOS-12
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Build FishyJoesNodeRuntime
        shell: zsh {0}
        run: |
          set -euxo pipefail

          ./scripts/compile-node-runtime.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: mac_generated
          path: node-runtime

  build-test-node-linux:
    name: "linux: Build and Test Node.js Runtime"
    runs-on: ubuntu-latest
    container:
      image: swift
    env:
      LIB_DIR: node-runtime/fishyjoes-runtime-native-ubuntu
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Configure build environment
        run: |
          set -eux
          apt-get -y update
          apt-get -y install zsh patchelf

      - name: Build FishyJoesNodeRuntime
        shell: zsh {0}
        run: |
          set -euxo pipefail

          ./scripts/compile-node-runtime.sh

      - name: Copy system swift runtime SOs
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cp -dv /usr/lib/swift/linux/libswift*.so* $LIB_DIR
          cp -dv /usr/lib/swift/linux/libicu*.so* $LIB_DIR
          cp -dv /usr/lib/swift/linux/libFoundation*.so $LIB_DIR
          cp -dv /usr/lib/swift/linux/libBlocksRuntime.so $LIB_DIR
          cp -dv /usr/lib/swift/linux/libdispatch.so $LIB_DIR
          cp -dv /usr/lib/x86_64-linux-gnu/libicui18n.so* $LIB_DIR
          cp -dv /usr/lib/x86_64-linux-gnu/libicuuc.so* $LIB_DIR
          cp -dv /usr/lib/x86_64-linux-gnu/libicudata.so* $LIB_DIR
          cp -dv /usr/lib/x86_64-linux-gnu/libxml2.so* $LIB_DIR

      - name: Patch system swift runtime SOs to use relative libraries
        shell: zsh {0}
        run: |
          cd $LIB_DIR

          SWIFT_RUN_PATH='/usr/lib/swift/linux:./:$ORIGIN'
          for LIB in lib*.so*; do
            patchelf --set-rpath $SWIFT_RUN_PATH $LIB
          done

      - name: Upload library
        uses: actions/upload-artifact@v3
        with:
          name: ubuntu_generated
          path: node-runtime

  build-test-node-windows:
    name: "windows: Build and Test Node.js Runtime"
    runs-on: windows-2019
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-5.6.2-release
          tag: 5.6.2-RELEASE

      - name: Compile swift
        run: |
          swift build --product FishyJoesNodeRuntime --configuration release --build-path ./.build/windows-build

      - name: Copy resources
        shell: bash
        run: |
          set -euxo pipefail

          LIB_DIR=node-runtime/fishyjoes-runtime-native-windows/

          mkdir -p $LIB_DIR
          cp .build/windows-build/x86_64-unknown-windows-msvc/release/FishyJoesNodeRuntime.dll $LIB_DIR

          cp -R /c/Library/icu-*/usr/bin/*.dll $LIB_DIR
          cp -R /c/Library/Swift-development/bin/*.dll $LIB_DIR

      - name: Upload library
        uses: actions/upload-artifact@v3
        with:
          name: windows_generated
          path: node-runtime

  node-pack:
    name: "Pack NPM Packages"
    runs-on: ubuntu-latest
    needs: [build-test-node-mac, build-test-node-linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Configure build environment
        run: |
          set -euxo pipefail
          sudo apt-get install zsh

      - name: Retrieve Artifacts
        uses: actions/download-artifact@v3

      - name: Install Artifacts
        shell: zsh {0}
        run: |
          set -euxo pipefail

          ls *

          rm -rf node-runtime
          mkdir -p node-runtime
          mv mac_generated/fishyjoes-runtime-native-macos node-runtime/
          mv ubuntu_generated/fishyjoes-runtime-native-ubuntu node-runtime/
          # TODO: Windows
          # mv windows_generated/fishyjoes-runtime-native-windows node-runtime/

          ls -R node-runtime/

      - name: Determine version
        shell: zsh {0}
        run: |
          set -euxo pipefail

          VERSION=${GITHUB_REF#refs/*/}
          if [[ ! $VERSION =~ [0-9]+\.[0-9]+\.[0-9]+ ]]; then
              VERSION="0.0.1-$(git rev-parse --short HEAD)"
          fi
          echo "Detected Version is '$VERSION'"
          echo VERSION=$VERSION >> $GITHUB_ENV
          NPM_PACKAGE_VERSION=`if [[ "${{ env.VERSION }}" =~ [0-9]+\.[0-9]+\.[0-9]+ ]]; then echo "${{ env.VERSION }}"; else echo "0.0.1"; fi`
          echo "Detected NPM Package Compatible Version is '$NPM_PACKAGE_VERSION'"
          echo NPM_PACKAGE_VERSION=$NPM_PACKAGE_VERSION >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v1
        with:
          node-version: '12.x'
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@cricut'

      - name: NPM Pack macOS
        shell: zsh {0}
        run: |
          set -euxo pipefail

          LIB_DIR=node-runtime/fishyjoes-runtime-native-macos
          sed "s:0.0.1:${{ env.NPM_PACKAGE_VERSION }}:g" ${LIB_DIR}/package.json > ${LIB_DIR}/package.json.upd
          mv ${LIB_DIR}/package.json.upd ${LIB_DIR}/package.json
          cd ${LIB_DIR}
          ls -la
          npm pack
          echo MAC_LIB_DIR=${LIB_DIR} >> $GITHUB_ENV

      - name: Upload NPM macOS Artifact
        uses: actions/upload-artifact@v2
        with:
          name: mac_npm_package
          path: ${{ env.MAC_LIB_DIR }}/*.tgz

      - name: NPM Pack Ubuntu
        shell: bash
        run: |
          set -euxo pipefail

          LIB_DIR=node-runtime/fishyjoes-runtime-native-ubuntu
          sed "s:0.0.1:${{ env.NPM_PACKAGE_VERSION }}:g" ${LIB_DIR}/package.json > ${LIB_DIR}/package.json.upd
          mv ${LIB_DIR}/package.json.upd ${LIB_DIR}/package.json
          cd ${LIB_DIR}
          ls -la
          npm pack
          echo UBUNTU_LIB_DIR=${LIB_DIR} >> $GITHUB_ENV

      - name: Upload NPM Ubuntu Artifact
        uses: actions/upload-artifact@v2
        with:
          name: ubuntu_npm_package
          path: ${{ env.UBUNTU_LIB_DIR }}/*.tgz

      - name: Publish NPM Packages
        if: github.event_name == 'release'
        env:
            NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail

          $(cd mac_npm_package/${{ env.MAC_LIB_DIR }}; npm publish *.tgz)
          $(cd ubuntu_npm_package/${{ env.UBUNTU_LIB_DIR }}; npm publish *.tgz)
          # TODO: Windows
          # $(cd windows_npm_package/${{ env.WINDOWS_LIB_DIR }}; npm publish *.tgz)

