name: Build & test

on:
  workflow_dispatch:
  pull_request:
  release:
    types: [published]
  push:
    branches:
      - main

jobs:
  test:
    name: Build & test
    env:
      SWIFT_WASM_URL: |-
        https://github.com/swiftwasm/swift/releases/download/swift-wasm-5.6.0-RELEASE/swift-wasm-5.6.0-RELEASE-macos_x86_64.pkg
    runs-on: macOS-11.0
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup Node
        uses: actions/setup-node@v1
        with:
          node-version: '16.x'
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@cricut'

      - name: Configure build environment
        shell: zsh {0}
        run: |
          set -euxo pipefail

          curl -Lo swift-wasm.pkg $SWIFT_WASM_URL
          sudo installer -pkg swift-wasm.pkg -target /

          brew install binaryen

          (cd node-tests; npm install)

      - name: Build
        shell: zsh {0}
        run: |
          set -euxo pipefail

          swift build

      - name: Test
        shell: zsh {0}
        run: |
          set -euxo pipefail
          npm install

          swift test

  build-test-publish-kotlin:
    name: Build, test, and sometimes publish kotlin portion of runtime
    runs-on: macOS-11.0
    env:
      JDK_VERSION: 11
      GRADLE_OPTS: -Dorg.gradle.daemon=false
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser
      GITHUB_PUBLISH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup JDK 1.11
        uses: actions/setup-java@v1
        with:
          java-version: 1.11

      - name: Test
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd kotlin-runtime
          ./gradlew test

      - name: Test publish
        shell: zsh {0}
        run: |
          set -euxo pipefail
          cd kotlin-runtime
          ./gradlew publishToMavenLocal

      - name: Publish
        shell: zsh {0}
        if: github.event_name == 'release'
        run: |
          set -euxo pipefail

          VERSION=${GITHUB_REF#refs/*/}
          if [[ ! $VERSION =~ [0-9]+\.[0-9]+\.[0-9]+ ]]; then
              VERSION="0.0.1"
          fi

          cd kotlin-runtime

          echo "Detected Version is '$VERSION'"
          export VERSION
          ./gradlew updateVersion
          ./gradlew build publish
