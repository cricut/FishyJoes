---
name: "Coverage"

"on":
  workflow_dispatch:
  push:
    branches:
      - main
  label:
    types:
      - created
  pull_request:

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: 20

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6'

      - name: Configure build environment
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y zsh libcurl4-openssl-dev

          swift run fishy-joes install-system-dependencies for-generation for-wasm

          source ~/.local/share/swiftly/env.sh
          echo "SWIFTLY_HOME_DIR=$SWIFTLY_HOME_DIR" >> "$GITHUB_ENV"
          echo "$SWIFTLY_BIN_DIR" >> "$GITHUB_PATH"
          echo "$HOME/.mint/bin" >> "$GITHUB_PATH"

          # Temporary workaround as swift 6.3 seems to have an LLVM crash in certain async functions we generate
          swiftly install 6.2.4
          swiftly use -y 6.2.4

          # TODO: sourcery has a weird swiftenv file that causes problems under the "swiftly > mint > sourcery" stack. This step shouldn't be needed
          swiftly run ~/.mint/bin/mint install --verbose krzysztofzablocki/Sourcery@2.3.0

          (cd integration-tests/TestAPI/bindings/ts/tests; npm install)
          (cd Tests/NAPITests/node-tests; npm install)

          if [[ ! -f "$HOME/.dotnet/tools/dotnet-coverage" ]]; then
            dotnet tool install --global dotnet-coverage --version 17.13.1
          fi
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Gather coverage
        shell: zsh {0}
        run: |
          set -euxo pipefail

          export WASI_SDK="$(
            swift sdk configure $SWIFT_WASM_VERSION-wasm32-unknown-wasi wasm32-unknown-wasi --show-configuration |
              awk '$1 == "sdkRootPath:" { print $2 }'
          )"

          ./scripts/generate-raw-coverage.sh
          ./scripts/gather-coverage.sh

      - name: "Get Cache: Coverage history"
        uses: actions/cache/restore@v5
        with:
          key: ${{ inputs.coverage-history-cache-key }}
          path: CoverageHistory

      - name: "Coverage: Generate Reports"
        if: true  # ${{ inputs.mode == 'pr' }}
        uses: danielpalme/ReportGenerator-GitHub-Action@a003c8fb9ac008fd0fffd5faa4f7d3ecb52e0675 # v5
        with:
          reports: "coverage-data/coverage.xml;coverage-data/jacoco-*/test/jacocoTestReport.xml;coverage-data/integration-tests-c-sharp.xml"
          targetdir: "CoverageReport"
          reporttypes: "MarkdownSummaryGithub;MarkdownDeltaSummary;Cobertura"
          historydir: "CoverageHistory"

      - name: "Coverage: Check changed lines (diff-cover)"
        if: true  # ${{ inputs.mode == 'pr' }}
        shell: bash
        run: |
          pip install diff_cover==10.2.0 --quiet
          diff-cover CoverageReport/Cobertura.xml \
            --compare-branch=origin/ \
            --format markdown:CoverageReport/DiffCoverage.md

      - name: "Coverage: Comment on PR"
        if: ${{ inputs.mode == 'pr' }}
        uses: actions/github-script@v9
        with:
          github-token: ${{ inputs.github-token }}
          script: |
            const fs          = require('fs');
            const marker      = '<!-- coverage-report -->';
            const diffPath    = 'CoverageReport/DiffCoverage.md';
            const deltaPath   = 'CoverageReport/DeltaSummary.md';
            const summaryPath = 'CoverageReport/SummaryGithub.md';

            const stripMethodCoveragePlaceholder = (text) =>
              text.replace(/\|[^|\n]*[Mm]ethod coverage[^|\n]*\|[^\n]*\n?/g, '');

            const stripFullyCoveredFiles = (text) =>
              text.replace(/^- .+ \(100%\)\n?/gm, '');

            const collapseDiffCoverageDetails = (text) => {
              const match = text.match(/^[\s\S]*?- \*\*Coverage\*\*:[^\n]*\n/m);
              if (!match) return text;
              const rest = text.slice(match[0].length).trim();
              if (!rest) return text;
              return match[0] + '\n<details>\n<summary>Per-file coverage details</summary>\n\n' + rest + '\n</details>';
            };

            let body = marker + '\n';
            if (fs.existsSync(diffPath)) {
              body += collapseDiffCoverageDetails(stripFullyCoveredFiles(fs.readFileSync(diffPath, 'utf8'))) + '\n\n---\n\n';
            }
            if (fs.existsSync(deltaPath)) {
              const delta = stripMethodCoveragePlaceholder(fs.readFileSync(deltaPath, 'utf8'));
              body += '<details>\n<summary>Delta Summary</summary>\n\n' + delta + '\n</details>\n\n---\n\n';
            }
            if (fs.existsSync(summaryPath)) {
              const summary = stripMethodCoveragePlaceholder(fs.readFileSync(summaryPath, 'utf8'));
              body += '<details>\n<summary>Full Summary</summary>\n\n' + summary + '\n</details>';
            } else {
              body += '### Code Coverage Report\n⚠️ No coverage data found — check that test results were cached correctly.';
            }

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                body,
              });
            }


