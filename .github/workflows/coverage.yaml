---
name: "Coverage"

"on":
  workflow_dispatch:
  push:
    branches:
      - main
  label:
    types:
      - created
  pull_request:

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: macOS-12
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SWIFT_WASM_URL: |-
        https://github.com/swiftwasm/swift/releases/download/swift-wasm-5.9-SNAPSHOT-2024-03-27-a/swift-wasm-5.9-SNAPSHOT-2024-03-27-a-macos_x86_64.pkg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Git Credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: 20

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '16.x'

      - name: Configure build environment
        shell: zsh {0}
        run: |
          set -euxo pipefail

          curl -Lo swift-wasm.pkg $SWIFT_WASM_URL
          sudo installer -pkg swift-wasm.pkg -target /

          brew install binaryen

          (cd integration-tests/TestAPI-bindings; npm install)
          (cd Tests/NAPITests/node-tests; npm install)

          dotnet tool install --global dotnet-coverage
          echo ${HOME}/.dotnet/tools >> $GITHUB_PATH

      - name: Gather coverage
        shell: zsh {0}
        run: |
          set -euxo pipefail

          ./scripts/generate-raw-coverage.sh
          ./scripts/gather-coverage.sh

      - name: Upload to sonar cloud
        shell: zsh {0}
        run: |
          set -euxo pipefail

          git fetch origin main

          brew install sonar-scanner

          sonar-scanner \
            '-Dsonar.sources=.' \
            '-Dsonar.coverageReportPaths=coverage-data/coverage.xml' \
            '-Dsonar.coverage.jacoco.xmlReportPaths=coverage-data/jacoco-*/test/jacocoTestReport.xml' \
            '-Dsonar.cs.vscoveragexml.reportsPaths=coverage-data/integration-tests-c-sharp.xml'
