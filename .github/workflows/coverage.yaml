name: Coverage
on:
  workflow_dispatch:
  label:
    types:
      - created
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: macOS-12
    env:
      JDK_VERSION: 11
      GRADLE_OPTS: -Dorg.gradle.daemon=false
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SWIFT_WASM_URL: |-
        https://github.com/swiftwasm/swift/releases/download/swift-wasm-5.6.0-RELEASE/swift-wasm-5.6.0-RELEASE-macos_x86_64.pkg
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup JDK 1.11
        uses: actions/setup-java@v1
        with:
          java-version: 1.11

      - name: Setup Node
        uses: actions/setup-node@v1
        with:
          node-version: '16.x'

      - name: Configure build environment
        shell: zsh {0}
        run: |
          set -euxo pipefail

          curl -Lo swift-wasm.pkg $SWIFT_WASM_URL
          sudo installer -pkg swift-wasm.pkg -target /

          brew install binaryen

          (cd integration-tests/TestAPI-bindings; npm install)
          (cd Tests/NAPITests/node-tests; npm install)

      - name: Gather coverage
        shell: zsh {0}
        run: |
          set -euxo pipefail

          ./scripts/generate-raw-coverage.sh
          ./scripts/gather-coverage.sh

      - name: Upload to sonar cloud
        shell: zsh {0}
        run: |
          set -euxo pipefail

          git fetch origin main

          brew install sonar-scanner

          sonar-scanner \
            '-Dsonar.sources=.' \
            '-Dsonar.coverageReportPaths=coverage-data/coverage.xml' \
            '-Dsonar.coverage.jacoco.xmlReportPaths=coverage-data/jacoco-*/test/jacocoTestReport.xml'
