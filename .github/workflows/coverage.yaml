---
name: "Coverage"

"on":
  workflow_dispatch:
  push:
    branches:
      - main
  label:
    types:
      - created
  pull_request:

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: [macOS, self-hosted, ARM64]
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SWIFT_WASM_VERSION: 5.10-SNAPSHOT-2024-04-26-a
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git Credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: 20

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6'

      - name: Force clear nuget cache
        run: "dotnet nuget locals all --clear"

      - name: Configure build environment
        shell: zsh {0}
        run: |
          set -euxo pipefail

          [[ -d ~/swift-wasm-toolchains/swift-wasm-$SWIFT_WASM_VERSION-macos_arm64.artifactbundle ]] || {
              mkdir -p ~/swift-wasm-toolchains
              curl -LJo swift-wasm.artifactbundle.zip \
                  https://github.com/swiftwasm/swift/releases/download/swift-wasm-$SWIFT_WASM_VERSION/swift-wasm-$SWIFT_WASM_VERSION-macos_arm64.artifactbundle.zip
              tar xf swift-wasm.artifactbundle.zip
              mv swift-wasm-$SWIFT_WASM_VERSION-macos_arm64.artifactbundle ~/swift-wasm-toolchains
          }

          (cd integration-tests/TestAPI/bindings/ts/tests; npm install)
          (cd Tests/NAPITests/node-tests; npm install)

          if [[ ! -f $HOME/.dotnet/tools/dotnet-coverage ]]; then
            dotnet tool install --global dotnet-coverage --version 17.13.1
          fi
          echo $HOME/.dotnet/tools >> $GITHUB_PATH

      - name: Gather coverage
        shell: zsh {0}
        run: |
          set -euxo pipefail

          export SWIFT_WASM_TOOLCHAIN=~/swift-wasm-toolchains/swift-wasm-$SWIFT_WASM_VERSION-macos_arm64.artifactbundle/$SWIFT_WASM_VERSION-wasm/wasm32-unknown-wasi/swift.xctoolchain
          export WASI_SDK=~/swift-wasm-toolchains/swift-wasm-$SWIFT_WASM_VERSION-macos_arm64.artifactbundle/$SWIFT_WASM_VERSION-wasm/wasm32-unknown-wasi/WASI.sdk

          ./scripts/generate-raw-coverage.sh
          ./scripts/gather-coverage.sh

      - name: Upload to sonar cloud
        shell: zsh {0}
        run: |
          set -euxo pipefail

          sonar-scanner \
            '-Dsonar.sources=.' \
            '-Dsonar.coverageReportPaths=coverage-data/coverage.xml' \
            '-Dsonar.coverage.jacoco.xmlReportPaths=coverage-data/jacoco-*/test/jacocoTestReport.xml' \
            '-Dsonar.cs.vscoveragexml.reportsPaths=coverage-data/integration-tests-c-sharp.xml'
