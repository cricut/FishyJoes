---
name: "Coverage"

"on":
  workflow_dispatch:
  push:
    branches:
      - main
      - cobbal/investigate-main-coverage

  label:
    types:
      - created
  pull_request:

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '20'
  NODE_VERSION: '18.x'
  DOTNET_VERSION: '8.0.x'
  GITHUB_USER: ${{ github.actor }}
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  coverage:
    runs-on: macos-26
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false
      # gather baseline coverage only on pushes to main
      COVERAGE_MODE: ${{ github.event_name == 'push' && github.ref == 'ref/head/main' && 'baseline' || 'report' }}
    steps:
      - name: Log
        run:
          set -euxo pipefail
          echo "github.event_name = ${{ github.event_name }}"
          echo "github.ref = ${{ github.ref }}"
          echo "THING = ${{ github.event_name == 'push' && github.ref == 'ref/head/main' && 'baseline' || 'report' }}"
          declare -p $COVERAGE_MODE
          exit 1

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: zulu

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://npm.pkg.github.com/'

      - name: Set up dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install tools
        shell: zsh {0}
        run: |
          set -euxo pipefail

          swift run fishy-joes install-system-dependencies for-generation for-wasm
          (cd integration-tests/TestAPI/bindings/ts/tests; npm install)
          (cd Tests/NAPITests/node-tests; npm install)

          if [[ ! -f $HOME/.dotnet/tools/dotnet-coverage ]]; then
            dotnet tool install --global dotnet-coverage --version 17.13.1
          fi
          echo $HOME/.dotnet/tools >> $GITHUB_PATH

      - name: Gather coverage
        shell: zsh {0}
        run: |
          set -euxo pipefail

          export WASI_SDK="$(
            swift sdk configure $SWIFT_WASM_VERSION-wasm32-unknown-wasi wasm32-unknown-wasi --show-configuration |
              awk '$1 == "sdkRootPath:" { print $2 }'
          )"

          ./scripts/generate-raw-coverage.sh
          ./scripts/gather-coverage.sh

      - name: "Get Cache: Coverage history"
        uses: actions/cache/restore@v5
        with:
          key: coverage-history-cache-key
          path: CoverageHistory

      - name: "Coverage: Generate Reports"
        uses: danielpalme/ReportGenerator-GitHub-Action@a003c8fb9ac008fd0fffd5faa4f7d3ecb52e0675  # v5
        with:
          reports: "\
            coverage-data/lcov.info;\
            coverage-data/jacoco-*/test/jacocoTestReport.xml;\
            coverage-data/integration-tests-c-sharp.xml"
          filefilters: "+*;-.build/*"
          sourcedirs: "\
            kotlin-runtime/src/main/kotlin/com/cricut/fishyjoes/runtime;\
            kotlin-runtime/src/test/kotlin/com/cricut/fishyjoes/runtime;\
            integration-tests/TestAPI/bindings/kotlin/generated/src/main/kotlin/com/cricut/testapi;\
            integration-tests/TestAPI/bindings/kotlin/src/test/kotlin/com/cricut/testapi"
          targetdir: "CoverageReport"

          reporttypes: "MarkdownSummaryGithub;MarkdownDeltaSummary;Cobertura;Badges;Html_Dark"
          historydir: "CoverageHistory"

      - name: "Coverage: Check changed lines (diff-cover)"
        shell: zsh {0}
        run: |
          set -euxo pipefail

          pip install diff_cover==10.2.0 --quiet
          diff-cover CoverageReport/Cobertura.xml \
            --compare-branch=origin/${GITHUB_BASE_REF:-main} \
            --format markdown:CoverageReport/DiffCoverage.md

      - name: "Upload coverage report as an artifact"
        id: coverage-artifact-upload-step
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: CoverageReport
          if-no-files-found: error

      - name: "Coverage: comment on PR"
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v9
        env:
          COVERAGE_DOWNLOAD_URL: ${{ steps.coverage-artifact-upload-step.outputs.artifact-url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs          = require('fs');
            const marker      = '<!-- coverage-report -->';
            const diffPath    = 'CoverageReport/DiffCoverage.md';
            const deltaPath   = 'CoverageReport/DeltaSummary.md';
            const summaryPath = 'CoverageReport/SummaryGithub.md';

            const stripMethodCoveragePlaceholder = (text) =>
              text.replace(/\|[^|\n]*[Mm]ethod coverage[^|\n]*\|[^\n]*\n?/g, '');

            const stripFullyCoveredFiles = (text) =>
              text.replace(/^- .+ \(100%\)\n?/gm, '');

            const collapseDiffCoverageDetails = (text) => {
              const match = text.match(/^[\s\S]*?- \*\*Coverage\*\*:[^\n]*\n/m);
              if (!match) return text;
              const rest = text.slice(match[0].length).trim();
              if (!rest) return text;
              return match[0] + '\n<details>\n<summary>Per-file coverage details</summary>\n\n' + rest + '\n</details>';
            };

            let body = marker + '\n';
            if (fs.existsSync(diffPath)) {
              body += collapseDiffCoverageDetails(stripFullyCoveredFiles(fs.readFileSync(diffPath, 'utf8'))) + '\n\n---\n\n';
            }
            if (fs.existsSync(deltaPath)) {
              const delta = stripMethodCoveragePlaceholder(fs.readFileSync(deltaPath, 'utf8'));
              body += '<details>\n<summary>Delta Summary</summary>\n\n' + delta + '\n</details>\n\n---\n\n';
            }
            if (fs.existsSync(summaryPath)) {
              const summary = stripMethodCoveragePlaceholder(fs.readFileSync(summaryPath, 'utf8'));
              body += '<details>\n<summary>Full Summary</summary>\n\n' + summary + '\n</details>\n\n';
            } else {
              body += '### Code Coverage Report\n⚠️ No coverage data found — check that test results were cached correctly.\n\n';
            }
            body += `[Download full report]( ${process.env.COVERAGE_DOWNLOAD_URL} )\n`;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                body,
              });
            }

      - name: "Coverage: save updated history"
        if: ${{ env.COVERAGE_MODE == 'baseline' }}
        uses: actions/cache/save@v5
        with:
          key: coverage-history-cache-key
          path: CoverageHistory
