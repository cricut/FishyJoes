name: "C# Runtime"

on:
  workflow_dispatch:
  push:
    branches:
      - main
  label:
    types:
      - created
  pull_request:
  release:
    types: [published]

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build-test-c-sharp-mac:
    name: "macOS: Build and Test C# Runtime"
    runs-on: macOS-12
    env:
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Git Credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Build FishyJoesCSharpRuntime
        shell: zsh {0}
        run: |
          set -euxo pipefail

          ./scripts/compile-c-sharp-runtime.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: mac_generated
          path: c-sharp-runtime/runtimes

  build-test-c-sharp-ubuntu:
    name: "Ubuntu: Build and Test C# Runtime"
    runs-on: ubuntu-latest
    container:
      image: swift
    env:
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser
      LIB_DIR: c-sharp-runtime/runtimes/linux/native
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Git Credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Configure build environment
        run: |
          set -eux
          apt-get -y update
          apt-get -y install zsh patchelf

      - name: Build FishyJoesCSharpRuntime
        shell: zsh {0}
        run: |
          set -euxo pipefail

          ./scripts/compile-c-sharp-runtime.sh

      - name: Copy swift runtime SOs
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cp -dv /usr/lib/swift/linux/libswift*.so* $LIB_DIR
          cp -dv /usr/lib/swift/linux/libicu*.so* $LIB_DIR
          cp -dv /usr/lib/swift/linux/libFoundation*.so $LIB_DIR
          cp -dv /usr/lib/swift/linux/libBlocksRuntime.so $LIB_DIR
          cp -dv /usr/lib/swift/linux/libdispatch.so $LIB_DIR
          cp -dv /usr/lib/x86_64-linux-gnu/libicui18n.so* $LIB_DIR
          cp -dv /usr/lib/x86_64-linux-gnu/libicuuc.so* $LIB_DIR
          cp -dv /usr/lib/x86_64-linux-gnu/libicudata.so* $LIB_DIR
          cp -dv /usr/lib/x86_64-linux-gnu/libxml2.so* $LIB_DIR

      - name: Patch system swift runtime SOs to use relative libraries
        shell: zsh {0}
        run: |
          cd $LIB_DIR

          SWIFT_RUN_PATH='/usr/lib/swift/linux:./:$ORIGIN'
          for LIB in lib*.so*; do
            patchelf --set-rpath $SWIFT_RUN_PATH $LIB
          done

      - name: Upload library
        uses: actions/upload-artifact@v3
        with:
          name: ubuntu_generated
          path: c-sharp-runtime/runtimes

  build-test-c-sharp-windows:
    name: "Windows: Build and Test C# Runtime"
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser
      LIB_DIR: c-sharp-runtime/runtimes/win/native
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Git Credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-5.6.2-release
          tag: 5.6.2-RELEASE

      - name: Build FishyJoesCSharpRuntime
        shell: pwsh
        run: |
          # Should perform the same actions as scripts/compile-c-sharp-runtime.sh, but must be done in powershell for swift-build to work
          swift build --product FishyJoesCSharpRuntime --configuration release --build-path ./.build/windows-build
          New-Item -ItemType Directory -Force -Path $Env:LIB_DIR
          Copy-Item .build\windows-build\x86_64-unknown-windows-msvc\release\FishyJoesCSharpRuntime.dll -Destination '$Env:LIB_DIR'

      - name: Copy swift runtime DLLs
        shell: bash
        run: |
          set -euxo pipefail

          cp -R /c/Library/icu-*/usr/bin/*.dll $LIB_DIR
          cp -R /c/Library/Swift-development/bin/*.dll $LIB_DIR

      # TODO: Unit test C# runtime instead of relying on integration tests
#      - name: Test FishyJoesCSharpRuntime from dotnet
#        shell: bash
#        run: |
#          set -euxo pipefail
#
#          cd c-sharp-runtime
#          dotnet test Cricut.\(config.module).sln

      - name: Upload library
        uses: actions/upload-artifact@v3
        with:
          name: windows_generated
          path: c-sharp-runtime/runtimes

  c-sharp-publish:
    name: "Publish C# Package"
    runs-on: ubuntu-latest
    needs: [build-test-c-sharp-mac, build-test-c-sharp-ubuntu, build-test-c-sharp-windows]
    env:
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser
      GITHUB_PUBLISH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Git Credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup dotnet
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: '6.0.x'

      - name: Configure build environment
        run: |
          set -euxo pipefail
          sudo apt-get install zsh

      - name: Retrieve Artifacts
        uses: actions/download-artifact@v3

      - name: Install Artifacts
        shell: zsh {0}
        run: |
          set -euxo pipefail

          ls *

          rm -rf c-sharp-runtime/runtimes
          mkdir -p c-sharp-runtime/runtimes
          mv mac_generated/osx c-sharp-runtime/runtimes/
          mv ubuntu_generated/linux c-sharp-runtime/runtimes/
          mv windows_generated/win c-sharp-runtime/runtimes/

          ls -R c-sharp-runtime/

      - name: Determine version
        shell: zsh {0}
        run: |
          set -euxo pipefail

          VERSION=${GITHUB_REF#refs/*/}
          if [[ ! $VERSION =~ [0-9]+\.[0-9]+\.[0-9]+ ]]; then
              VERSION="0.0.1-$(git rev-parse --short HEAD)"
          fi
          echo "Detected Version is '$VERSION'"
          echo VERSION=$VERSION >> $GITHUB_ENV

      - name: Pack
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd c-sharp-runtime
          dotnet pack -c Release -o out /p:PackageVersion="${{ env.VERSION }}"

      - name: Upload result
        uses: actions/upload-artifact@v3
        with:
          name: nuget-package
          path: c-sharp-runtime/out/*.*nupkg

      - name: Publish
        shell: zsh {0}
        if: github.event_name == 'release'
        run: |
          set -euxo pipefail

          dotnet nuget push ./c-sharp-runtime/out/*.*nupkg \
            --source https://nuget.pkg.github.com/cricut \
            --api-key ${{ github.token }} \
            --skip-duplicate
