name: Java Runtime

on:
  workflow_dispatch:
  push:
    branches:
      - main
  label:
    types:
      - created
  pull_request:
  release:
    types: [published]

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build-test-kotlin-mac:
    name: "macOS: Build and test kotlin runtime"
    runs-on: macOS-12
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup git credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: 17

      - name: Build native FishyJoesJavaRuntime
        shell: zsh {0}
        run: |
          set -euxo pipefail

          ./scripts/compile-kotlin-native-runtime.sh
          (cd kotlin-runtime && ./gradlew publishToMavenLocal)

      - name: Test native FishyJoesJavaRuntime from gradle
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd kotlin-runtime
          ./gradlew test

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: mac_lib
          path: kotlin-runtime/src/generated/resources/mac/

  build-test-kotlin-ubuntu:
    name: "Ubuntu: Build and test kotlin runtime"
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup git credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: 17

      - name: Configure build environment
        run: |
          set -euxo pipefail

          sudo apt-get install zsh

      - name: Build native FishyJoesJavaRuntime
        shell: zsh {0}
        run: |
          set -euxo pipefail

          ./scripts/compile-kotlin-native-runtime.sh
          (cd kotlin-runtime && ./gradlew publishToMavenLocal)

      - name: Test native FishyJoesJavaRuntime from gradle
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd kotlin-runtime
          ./gradlew test

      - name: Build android FishyJoesJavaRuntime
        uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185
        with:
          username: cricut-builduser
          password: ${{ secrets.CRICUT_GPR_TOKEN }}
          registry: ghcr.io
          image: ghcr.io/cricut/android-swift-runtime:0.1.0
          options: -v ${{ github.workspace }}:/work -w /work
          run: /work/scripts/compile-android-runtime.sh

      - name: Upload library
        uses: actions/upload-artifact@v3
        with:
          name: ubuntu_generated
          path: kotlin-runtime/src/generated

  build-test-kotlin-windows:
    name: "Windows: Build and test kotlin runtime"
    runs-on: windows-latest
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser
      LIB_DIR: kotlin-runtime/src/generated/resources/windows
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup git credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: 17

      - uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-5.6.2-release
          tag: 5.6.2-RELEASE

      - name: Build FishyJoesJavaRuntime
        shell: pwsh
        run: |
          # Should perform the same actions as scripts/compile-kotlin-native-runtime.sh, but must be done in powershell for swift-build to work
          swift build --product FishyJoesJavaRuntime --configuration release --build-path ./.build/windows-build
          New-Item -ItemType Directory -Force -Path $env:LIB_DIR
          Copy-Item .build\windows-build\x86_64-unknown-windows-msvc\release\FishyJoesJavaRuntime.dll -Destination $env:LIB_DIR

      - name: Test FishyJoesJavaRuntime from gradle
        shell: bash
        run: |
          set -euxo pipefail

          cd kotlin-runtime
          ./gradlew test

      - name: Upload library
        uses: actions/upload-artifact@v3
        with:
          name: windows_lib
          path: kotlin-runtime/src/generated/resources/windows

  kotlin-publish:
    name: Publish kotlin package
    runs-on: ubuntu-latest
    needs: [build-test-kotlin-mac, build-test-kotlin-ubuntu, build-test-kotlin-windows]
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser
      GITHUB_PUBLISH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Git Credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: 17

      - name: Configure build environment
        run: |
          set -euxo pipefail

          sudo apt-get install zsh

      - name: Retrieve artifacts
        uses: actions/download-artifact@v3

      - name: Install artifacts
        shell: zsh {0}
        run: |
          set -euxo pipefail

          ls *

          rm -rf kotlin-runtime/src/generated
          mv ubuntu_generated kotlin-runtime/src/generated
          mkdir -p kotlin-runtime/src/generated/resources/{mac,windows}
          mv mac_lib/*.dylib kotlin-runtime/src/generated/resources/mac/
          mv windows_lib/*.dll kotlin-runtime/src/generated/resources/windows/

      - name: Test publish
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd kotlin-runtime
          ./gradlew publishToMavenLocal

      - name: Publish
        shell: zsh {0}
        if: github.event_name == 'release'
        run: |
          set -euxo pipefail

          VERSION=${GITHUB_REF#refs/*/}
          if [[ ! $VERSION =~ [0-9]+\.[0-9]+\.[0-9]+ ]]; then
              VERSION="0.0.1"
          fi

          cd kotlin-runtime

          echo "Detected Version is '$VERSION'"
          export VERSION
          ./gradlew updateVersion
          ./gradlew build publish
