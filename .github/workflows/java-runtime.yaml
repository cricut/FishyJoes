name: java-runtime

on:
  workflow_dispatch:
  push:
    branches:
      - main
  label:
    types:
      - created
  pull_request:
  release:
    types: [published]

jobs:
  build-test-kotlin-mac:
    name: "mac: Build and test java runtime"
    runs-on: macOS-latest
    env:
      JDK_VERSION: 11
      NDK_VERSION: 21.3.6528147
      GRADLE_OPTS: -Dorg.gradle.daemon=false
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser
      SWIFT_ANDROID_URL: |-
        https://github.com/vgorloff/swift-everywhere-toolchain/releases/download/1.0.77/swift-android-toolchain.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Configure build environment
        shell: zsh {0}
        run: |
          set -euxo pipefail

          ~/Library/Android/sdk/tools/bin/sdkmanager "ndk;$NDK_VERSION" >/dev/null 2>&1
          sudo mkdir -p /usr/local/ndk
          sudo ln -s ~/Library/Android/sdk/ndk/$NDK_VERSION /usr/local/ndk/$NDK_VERSION

          curl -Lo swift-android-toolchain.tar.gz $SWIFT_ANDROID_URL
          sudo mkdir -p /Library/Developer/Toolchains
          sudo tar -xf swift-android-toolchain.tar.gz -C /Library/Developer/Toolchains/

      - name: Setup JDK 1.11
        uses: actions/setup-java@v1
        with:
          java-version: 1.11

      - name: Build FishyJoesJavaRuntime
        shell: zsh {0}
        run: |
          set -euxo pipefail

          libdir=kotlin-runtime/src/generated/resources

          rm -rf $libdir
          mkdir -p $libdir/mac

          swift build --configuration release --product FishyJoesJavaRuntime
          cp .build/release/libFishyJoesJavaRuntime.dylib $libdir/mac

          androidsStupidPlatforms=(
              "aarch64-linux-android aarch64-unknown-linux-android arm64-v8a"
              "arm-linux-androideabi armv7-unknown-linux-android armeabiv7a"
              "i686-linux-android i686-unknown-linux-android x86"
              "x86_64-linux-android x86_64-unknown-linux-android x86_64"
          )

          for platformStr in $androidsStupidPlatforms; do
              platform=(${(z)platformStr})
              /Library/Developer/Toolchains/swift-android-toolchain/usr/bin/swift-build-${platform[1]} --configuration release --product FishyJoesJavaRuntime
              installDir=$libdir/${platform[3]}
              mkdir -p $installDir/
              cp .build/${platform[2]}/release/libFishyJoesJavaRuntime.so $installDir/
          done
      - name: Test FishyJoesJavaRuntime from gradle
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd kotlin-runtime
          ./gradlew test

      - name: Upload artifacts
        uses: actions/upload-artifact@v2
        with:
          name: mac_generated
          path: kotlin/src/generated

  build-test-kotlin-linux:
    name: "linux: Build and test java runtime"
    runs-on: ubuntu-latest
    env:
      JDK_VERSION: 11
      GRADLE_OPTS: -Dorg.gradle.daemon=false
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup JDK 1.11
        uses: actions/setup-java@v1
        with:
          java-version: 1.11

      - name: Configure build environment
        run: |
          set -euxo pipefail
          sudo apt-get install zsh

      - name: Build FishyJoesJavaRuntime
        shell: zsh {0}
        run: |
          set -euxo pipefail

          libdir=kotlin-runtime/src/generated/resources

          rm -rf $libdir
          mkdir -p $libdir/linux

          swift build --configuration release --product FishyJoesJavaRuntime
          cp .build/release/libFishyJoesJavaRuntime.so $libdir/linux

      - name: Test FishyJoesJavaRuntime from gradle
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd kotlin-runtime
          ./gradlew test

      - name: Upload library
        uses: actions/upload-artifact@v2
        with:
          name: ubuntu_lib
          path: kotlin-runtime/src/generated/resources/linux/libFishyJoesJavaRuntime.so

  build-test-kotlin-windows:
    name: "windows: Build and test kotlin bindings"
    runs-on: windows-2019
    env:
      JDK_VERSION: 11
      GRADLE_OPTS: -Dorg.gradle.daemon=false
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup JDK 1.11
        uses: actions/setup-java@v1
        with:
          java-version: 1.11

      - uses: MaxDesiatov/swift-windows-action@v1
        with:
          shell-action: |
            swift build --product FishyJoesJavaRuntime --configuration release --build-path ./.build/windows-build
          swift-version: "5.4.2"

      - name: Copy resource
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p kotlin-runtime/src/generated/resources/windows
          cp .build/windows-build/x86_64-unknown-windows-msvc/release/FishyJoesJavaRuntime.dll kotlin/src/generated/resources/windows

      - name: Test FishyJoesJavaRuntime from gradle
        shell: pwsh
        run: |
          cd kotlin
          .\gradlew test

      - name: Upload library
        uses: actions/upload-artifact@v2
        with:
          name: windows_lib
          path: kotlin-runtime/src/generated/resources/windows/FishyJoesJavaRuntime.dll

  kotlin-publish:
    name: Publish kotlin package
    runs-on: ubuntu-latest
    needs: [build-test-kotlin-mac, build-test-kotlin-linux, build-test-kotlin-windows]
    if: success() && github.event_name == 'release'
    env:
      JDK_VERSION: 11
      GRADLE_OPTS: -Dorg.gradle.daemon=false
      GITHUB_TOKEN: ${{ secrets.CRICUT_GPR_TOKEN }}
      GITHUB_USER: cricut-builduser
      GITHUB_PUBLISH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Git Credentials
        uses: fusion-engineering/setup-git-credentials@v2.0.1
        with:
          credentials: https://cricut-builduser:${{ secrets.CRICUT_GPR_TOKEN }}@github.com/

      - name: Setup JDK 1.11
        uses: actions/setup-java@v1
        with:
          java-version: 1.11

      - name: Configure build environment
        run: |
          set -euxo pipefail
          sudo apt-get install zsh

      - name: Retrieve Artifacts
        uses: actions/download-artifact@v2

      - name: Install Artifacts
        shell: zsh {0}
        run: |
          set -euxo pipefail

          ls *

          rm -rf kotlin/src/generated
          mv mac_generated kotlin/src/generated
          mkdir -p kotlin-runtime/src/generated/resources/{windows,linux}
          mv ubuntu_lib/libFishyJoesJavaRuntime.so kotlin-runtime/src/generated/resources/linux/
          mv windows_lib/FishyJoesJavaRuntime.dll kotlin-runtime/src/generated/resources/windows/

      - name: Test publish
        shell: zsh {0}
        run: |
          set -euxo pipefail

          cd kotlin
          ./gradlew publishToMavenLocal

      - name: Publish
        shell: zsh {0}
        if: github.event_name == 'release'
        run: |
          set -euxo pipefail

          VERSION=${GITHUB_REF#refs/*/}
          if [[ ! $VERSION =~ [0-9]+\.[0-9]+\.[0-9]+ ]]; then
              VERSION="0.0.1"
          fi

          cd kotlin

          echo "Detected Version is '$VERSION'"
          export VERSION
          ./gradlew updateVersion
          ./gradlew build publish
